<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novetec · Gestión de Despacho</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16232E; --paper:#F1F3F5; --card:#FFFFFF; --line:#D5DBE1; --muted:#5D6B77;
  --rojo:#C7392F; --rojo-bg:#FBEAE8; --ambar:#B57708; --ambar-bg:#FCF3E1;
  --verde:#2E7D4F; --verde-bg:#E7F3EC; --gris-bg:#EAEDF0; --vencida:#7A1F17;
  --radius:10px; --mono:'IBM Plex Mono',monospace; --sans:'Archivo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:15px;line-height:1.45}
header{background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
header .sub{font-family:var(--mono);font-size:12px;color:#9FB0BE}
header .conn{margin-left:auto;font-family:var(--mono);font-size:11px;color:#9FB0BE;cursor:pointer;text-decoration:underline dotted}
nav{background:var(--card);border-bottom:1px solid var(--line);display:flex;overflow-x:auto;position:sticky;top:0;z-index:10}
nav button{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:13px 18px;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
nav button.on{color:var(--ink);border-bottom-color:var(--ink)}
main{max-width:1080px;margin:0 auto;padding:22px 16px 80px}
h2{font-size:15px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin:26px 0 12px}
h2:first-child{margin-top:0}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.mono{font-family:var(--mono)}
.muted{color:var(--muted)}
.small{font-size:12.5px}
button.btn{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.04em;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px 16px;cursor:pointer}
button.btn:hover{background:#0E1820}
button.btn.sec{background:none;color:var(--ink);border:1.5px solid var(--ink)}
button.btn.mini{padding:6px 10px;font-size:12px}
button.btn.peligro{background:none;border:1.5px solid var(--rojo);color:var(--rojo)}
input,select,textarea{font-family:var(--mono);font-size:14px;padding:9px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ink);outline-offset:1px}
label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}
/* Semáforo */
.sem-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:640px){.sem-strip{grid-template-columns:repeat(2,1fr)}}
.sem-box{border-radius:var(--radius);padding:14px;border:1px solid var(--line);background:var(--card)}
.sem-box .n{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1}
.sem-box .l{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:6px}
.sem-box.rojo{background:var(--rojo-bg)}.sem-box.rojo .n,.sem-box.rojo .l{color:var(--rojo)}
.sem-box.ambar{background:var(--ambar-bg)}.sem-box.ambar .n,.sem-box.ambar .l{color:var(--ambar)}
.sem-box.verde{background:var(--verde-bg)}.sem-box.verde .n,.sem-box.verde .l{color:var(--verde)}
.sem-box.vencida{background:var(--vencida)}.sem-box.vencida .n,.sem-box.vencida .l{color:#fff}
/* Etiqueta de carga (fila OC) */
.tag{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;display:flex;overflow:hidden}
.tag .bar{width:7px;flex:none}
.tag .bar.rojo{background:var(--rojo)}.tag .bar.ambar{background:var(--ambar)}.tag .bar.verde{background:var(--verde)}
.tag .bar.vencida{background:var(--vencida)}.tag .bar.gris{background:#AEB9C2}
.tag .body{flex:1;padding:12px 14px;min-width:0}
.tag .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.tag .folio{font-family:var(--mono);font-weight:600;font-size:15px}
.chip{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--gris-bg);color:var(--muted)}
.chip.rojo{background:var(--rojo-bg);color:var(--rojo)}
.chip.ambar{background:var(--ambar-bg);color:var(--ambar)}
.chip.verde{background:var(--verde-bg);color:var(--verde)}
.chip.vencida{background:var(--vencida);color:#fff}
.chip.ink{background:var(--ink);color:#fff}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1.5px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}
td.num,th.num{text-align:right;font-family:var(--mono)}
.item-row{display:grid;grid-template-columns:1fr 110px 130px 34px;gap:8px;margin-bottom:8px}
@media(max-width:640px){.item-row{grid-template-columns:1fr 80px 100px 30px}}
.item-row button{border:none;background:none;color:var(--rojo);font-size:18px;cursor:pointer}
.acciones{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.vacio{text-align:center;color:var(--muted);padding:30px;font-size:14px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:var(--mono);font-size:13px;padding:12px 18px;border-radius:8px;display:none;z-index:99;max-width:90vw}
#velo{position:fixed;inset:0;background:rgba(22,35,46,.35);display:none;align-items:center;justify-content:center;z-index:50;font-family:var(--mono);color:#fff;font-size:14px}
details.form{border:1.5px dashed var(--line);border-radius:var(--radius);margin-bottom:16px;background:#FAFBFC}
details.form summary{padding:13px 16px;font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;list-style:none}
details.form summary::before{content:'+ '}
details.form[open] summary::before{content:'– '}
details.form .inner{padding:0 16px 16px}
.filtro{margin-bottom:12px}
#setup{max-width:460px;margin:60px auto;padding:0 16px}
#setup .card{padding:26px}
#setup h1{font-size:18px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
a{color:var(--ink)}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <div class="card">
    <h1>Novetec · Gestión</h1>
    <p class="muted small">Conecta la app con el repositorio privado de datos. El token queda guardado solo en este navegador.</p>
    <label>Usuario u organización de GitHub</label>
    <input id="s-owner" placeholder="ej: novetec-spa">
    <label>Repositorio de datos</label>
    <input id="s-repo" placeholder="novetec-datos">
    <label>Token de acceso (fine-grained)</label>
    <input id="s-token" type="password" placeholder="github_pat_...">
    <div class="acciones"><button class="btn" onclick="conectar()">Conectar</button></div>
    <p id="s-err" class="small" style="color:var(--rojo);margin-top:10px"></p>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <h1>Novetec · Despacho</h1>
  <span class="sub" id="hoy-lbl"></span>
  <span class="conn" onclick="cambiarConexion()">cambiar conexión</span>
</header>
<nav id="tabs">
  <button data-t="panel" class="on">Panel</button>
  <button data-t="cot">Cotizaciones</button>
  <button data-t="oc">Órdenes de compra</button>
  <button data-t="guias">Guías de despacho</button>
  <button data-t="inv">Inventario</button>
</nav>
<main id="vista"></main>
</div>

<div id="toast"></div>
<div id="velo"><span id="velo-msg">Guardando…</span></div>

<script>
/* ================= Conexión GitHub ================= */
const LSKEY='novetec_cfg';
let cfg=null;
let DB={}; // path -> {data, sha}
const ARCH={cot:'data/cotizaciones.json',oc:'data/ordenes_compra.json',guias:'data/guias_despacho.json',inv:'data/inventario.json',conf:'data/config.json',pend:'data/pendientes.json'};

const b64dec=s=>new TextDecoder().decode(Uint8Array.from(atob(s.replace(/\s/g,'')),c=>c.charCodeAt(0)));
function b64enc(s){const b=new TextEncoder().encode(s);let r='';for(let i=0;i<b.length;i+=8192)r+=String.fromCharCode(...b.subarray(i,i+8192));return btoa(r)}

async function gh(path,opts={}){
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/${path}`,{
    ...opts,headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`${r.status}: ${e.message||'error de GitHub'}`)}
  return r.json();
}
async function cargarArchivo(p){
  const j=await gh(`contents/${p}?t=${Date.now()}`);
  DB[p]={data:JSON.parse(b64dec(j.content)),sha:j.sha};
}
async function guardarArchivo(p,msg){
  try{
    const j=await gh(`contents/${p}`,{method:'PUT',body:JSON.stringify({message:msg,content:b64enc(JSON.stringify(DB[p].data,null,2)),sha:DB[p].sha})});
    DB[p].sha=j.content.sha;
  }catch(e){
    if(e.message.startsWith('409')||e.message.startsWith('422')){
      toast('⚠ Otro usuario guardó cambios. Recargando datos…');await cargarTodo();render();throw new Error('conflicto');
    }
    throw e;
  }
}
async function subirDocumento(carpeta,file){
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
  const ruta=`documentos/${carpeta}/${Date.now()}_${file.name.replace(/[^\w.\-]/g,'_')}`;
  await gh(`contents/${ruta}`,{method:'PUT',body:JSON.stringify({message:`Documento: ${file.name}`,content:b64})});
  return ruta;
}
async function borrarArchivoRepo(p,msg){
  try{const j=await gh(`contents/${encodeURI(p)}?t=${Date.now()}`);
    await gh(`contents/${encodeURI(p)}`,{method:'DELETE',body:JSON.stringify({message:msg,sha:j.sha})});
  }catch(e){/* si el archivo ya no existe, continuar */}
}
async function cargarTodo(){await Promise.all(Object.values(ARCH).map(cargarArchivo))}

async function conectar(){
  const owner=v('s-owner').trim(),repo=v('s-repo').trim(),token=v('s-token').trim();
  if(!owner||!repo||!token){document.getElementById('s-err').textContent='Completa los tres campos.';return}
  cfg={owner,repo,token};
  try{await gh('contents/data');localStorage.setItem(LSKEY,JSON.stringify(cfg));iniciar()}
  catch(e){document.getElementById('s-err').textContent='No se pudo conectar: '+e.message;cfg=null}
}
function cambiarConexion(){if(confirm('¿Desconectar este navegador del repositorio?')){localStorage.removeItem(LSKEY);location.reload()}}

/* ================= Utilidades ================= */
const v=id=>document.getElementById(id).value;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clp=n=>new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP'}).format(n||0);
const num=n=>new Intl.NumberFormat('es-CL').format(n||0);
const hoyISO=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
function fFecha(iso){if(!iso)return '—';const[a,m,d]=iso.split('-');return `${d}-${m}-${a}`}
function dias(iso){if(!iso)return null;const[a,m,d]=iso.split('-').map(Number);const f=new Date(a,m-1,d);const h=new Date();h.setHours(0,0,0,0);return Math.round((f-h)/86400000)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._x);t._x=setTimeout(()=>t.style.display='none',4200)}
function velo(on,msg){document.getElementById('velo').style.display=on?'flex':'none';if(msg)document.getElementById('velo-msg').textContent=msg}

/* Estado y semáforo de OC */
function ocTot(oc){return oc.items.reduce((s,i)=>s+(+i.cantidad||0),0)}
function ocDesp(oc){return oc.items.reduce((s,i)=>s+(+i.cantidad_despachada||0),0)}
function ocEstado(oc){const t=ocTot(oc),d=ocDesp(oc);return d<=0?'pendiente':(d<t?'parcial':'despachada')}
function ocComp(oc){return oc.items.reduce((s,i)=>s+(+i.cantidad_comprada||0),0)}
function chipCompra(oc){const t=ocTot(oc),c=ocComp(oc);
  if(c<=0)return '<span class="chip rojo">Compra pendiente</span>';
  if(c<t)return `<span class="chip ambar">Compra parcial ${num(c)}/${num(t)}</span>`;
  return '<span class="chip ink">Comprada ✓</span>'}
function semaforo(oc){
  if(ocEstado(oc)==='despachada')return {c:'gris',txt:'despachada'};
  const dd=dias(oc.fecha_entrega);
  const s=DB[ARCH.conf].data.semaforo||{rojo_dias:5,amarillo_dias:10};
  if(dd===null)return {c:'gris',txt:'sin fecha'};
  if(dd<0)return {c:'vencida',txt:`vencida ${Math.abs(dd)} d`};
  if(dd<=s.rojo_dias)return {c:'rojo',txt:`${dd} días`};
  if(dd<=s.amarillo_dias)return {c:'ambar',txt:`${dd} días`};
  return {c:'verde',txt:`${dd} días`};
}
const ESTADO_LBL={pendiente:'Pendiente',parcial:'Despacho parcial',despachada:'Despachada'};

/* Cola de documentos por procesar con Claude */
const TIPO_LBL={cotizaciones:'Cotización',ordenes_compra:'OC'};
async function subirPendiente(tipo){
  const f=document.getElementById('pd-file-'+tipo).files[0];
  if(!f){toast('Selecciona un archivo primero.');return}
  velo(true,'Subiendo documento…');
  try{
    const ruta=await subirDocumento('pendientes/'+tipo,f);
    DB[ARCH.pend].data.pendientes.push({id:'P-'+Date.now(),tipo,archivo:ruta,nombre:f.name,subido:hoyISO(),nota:v('pd-nota-'+tipo).trim()});
    await guardarArchivo(ARCH.pend,`Documento en cola: ${f.name} (${tipo})`);
    toast('Documento en cola ✓ Claude lo procesará y cargará los datos.');render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
function formPendiente(tipo,accept){
  return `<details class="form"><summary>Subir documento de ${TIPO_LBL[tipo].toLowerCase()} (lo procesa Claude)</summary><div class="inner">
    <p class="small muted" style="margin-top:10px">Sube el archivo tal como llegó. Quedará en una cola y Claude extraerá y cargará los datos — no escribas nada a mano por esta vía.</p>
    <label>Archivo</label><input id="pd-file-${tipo}" type="file" accept="${accept}">
    <label>Nota para Claude (opcional)</label><input id="pd-nota-${tipo}" placeholder="ej: corresponde a la cotización 456">
    <div class="acciones"><button class="btn" onclick="subirPendiente('${tipo}')">Dejar en cola</button></div>
  </div></details>`;
}
function listaPend(tipo){
  const ps=DB[ARCH.pend].data.pendientes.filter(p=>p.tipo===tipo);
  if(!ps.length)return '';
  return `<div class="card" style="border-color:var(--ambar)"><b class="small" style="text-transform:uppercase;letter-spacing:.08em;color:var(--ambar)">En cola para procesar (${ps.length})</b>
  ${ps.map(p=>`<div class="small" style="margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <span class="mono">${fFecha(p.subido)}</span>
    <a href="https://github.com/${cfg.owner}/${cfg.repo}/blob/main/${p.archivo}" target="_blank">${esc(p.nombre)}</a>
    ${p.nota?`<span class="muted">· ${esc(p.nota)}</span>`:''}
    <button class="btn mini peligro" onclick="borrarPendiente('${esc(p.id)}')">Quitar</button>
  </div>`).join('')}</div>`;
}
async function borrarPendiente(id){
  const arr=DB[ARCH.pend].data.pendientes;const p=arr.find(x=>x.id===id);if(!p)return;
  if(!confirm(`¿Quitar "${p.nombre}" de la cola y borrar el archivo del repositorio?`))return;
  velo(true,'Quitando…');
  try{
    arr.splice(arr.indexOf(p),1);
    await guardarArchivo(ARCH.pend,`Quitado de la cola: ${p.nombre}`);
    await borrarArchivoRepo(p.archivo,`Borrado documento en cola: ${p.nombre}`);
    render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

/* ================= Navegación ================= */
let tab='panel';
document.getElementById('tabs').addEventListener('click',e=>{
  if(e.target.dataset.t){tab=e.target.dataset.t;
    document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===tab));render()}
});
function render(){
  const m=document.getElementById('vista');
  m.innerHTML={panel:rPanel,cot:rCot,oc:rOC,guias:rGuias,inv:rInv}[tab]();
  if(tab==='guias')prepFormGuia();
}

/* ================= Panel ================= */
function rPanel(){
  const ocs=DB[ARCH.oc].data.ordenes;
  const act=ocs.filter(o=>ocEstado(o)!=='despachada');
  const g={vencida:[],rojo:[],ambar:[],verde:[],gris:[]};
  act.forEach(o=>g[semaforo(o).c].push(o));
  const orden=[...g.vencida,...g.rojo,...g.ambar,...g.verde,...g.gris];
  const cotP=DB[ARCH.cot].data.cotizaciones.filter(c=>c.estado==='enviada');
  const invBajo=DB[ARCH.inv].data.productos.filter(p=>p.cantidad<0);
  return `
  <div class="sem-strip">
    <div class="sem-box vencida"><div class="n">${g.vencida.length}</div><div class="l">Vencidas</div></div>
    <div class="sem-box rojo"><div class="n">${g.rojo.length}</div><div class="l">≤ ${DB[ARCH.conf].data.semaforo.rojo_dias} días</div></div>
    <div class="sem-box ambar"><div class="n">${g.ambar.length}</div><div class="l">≤ ${DB[ARCH.conf].data.semaforo.amarillo_dias} días</div></div>
    <div class="sem-box verde"><div class="n">${g.verde.length}</div><div class="l">Con holgura</div></div>
  </div>
  ${invBajo.length?`<div class="card" style="border-color:var(--rojo)"><b style="color:var(--rojo)">⚠ Inventario en negativo:</b> <span class="mono small">${invBajo.map(p=>esc(p.nombre)).join(', ')}</span></div>`:''}
  ${DB[ARCH.pend].data.pendientes.length?`<div class="card" style="border-color:var(--ambar)">📄 <b>${DB[ARCH.pend].data.pendientes.length}</b> documento(s) en cola esperando que Claude los procese y cargue.</div>`:''}
  <h2>Órdenes por despachar (${act.length})</h2>
  ${orden.length?orden.map(tagOC).join(''):'<div class="card vacio">No hay órdenes pendientes de despacho.</div>'}
  <h2>Cotizaciones sin responder (${cotP.length})</h2>
  ${cotP.length?cotP.map(c=>`<div class="tag"><div class="bar gris"></div><div class="body"><div class="top"><span class="folio">COT ${esc(c.folio)}</span><span class="chip">${fFecha(c.fecha)}</span><span class="muted small">${esc(c.cliente)}</span></div></div></div>`).join(''):'<div class="card vacio">Sin cotizaciones pendientes.</div>'}`;
}
function tagOC(o){
  const s=semaforo(o),e=ocEstado(o);
  const pend=o.items.filter(i=>(+i.cantidad||0)-(+i.cantidad_despachada||0)>0);
  return `<div class="tag"><div class="bar ${s.c}"></div><div class="body">
    <div class="top">
      <span class="folio">OC ${esc(o.folio)}</span>
      <span class="chip ${s.c}">${s.txt}</span>
      <span class="chip">${ESTADO_LBL[e]}</span>
      ${chipCompra(o)}
      <span class="muted small">Entrega: <span class="mono">${fFecha(o.fecha_entrega)}</span> · ${esc(o.destino||'—')}</span>
    </div>
    ${(()=>{const pc=o.items.filter(i=>(+i.cantidad||0)-(+i.cantidad_comprada||0)>0);
      return pc.length?`<div class="small" style="margin-top:6px;color:var(--rojo)">Falta comprar: ${pc.map(i=>`${esc(i.producto)} <span class="mono">(${num((+i.cantidad||0)-(+i.cantidad_comprada||0))})</span>`).join(' · ')}</div>`:''})()}
    ${pend.length?`<div class="small muted" style="margin-top:6px">Falta despachar: ${pend.map(i=>`${esc(i.producto)} <span class="mono">(${num((+i.cantidad||0)-(+i.cantidad_despachada||0))})</span>`).join(' · ')}</div>`:''}
  </div></div>`;
}

/* ================= Cotizaciones ================= */
function filaItem(pre={}){
  return `<div class="item-row">
    <input class="it-prod" list="dl-prod" placeholder="Producto" value="${esc(pre.producto||'')}">

async function crearCot(){

async function borrarCot(id){

  if(c.estado==='convertida'){toast('Tiene una OC asociada: da de baja la OC primero.');return}

function prefillOC(cotId){
  const d=document.getElementById('f-oc');d.open=true;
  document.getElementById('o-cot').value=cotId;
  document.getElementById('o-cot').dispatchEvent(new Event('change'));
  d.scrollIntoView({behavior:'smooth'});
}
document.addEventListener('change',e=>{
  if(e.target.id==='o-cot'){
    const c=DB[ARCH.cot].data.cotizaciones.find(x=>x.id===e.target.value);
    if(c)document.getElementById('o-items').innerHTML=c.items.map(filaItem).join('');
  }
});
async function crearOC(){
  const folio=v('o-folio').trim(),cotId=v('o-cot'),items=leerItems('o-items');
  if(!folio||!items.length||!v('o-fent')){toast('Faltan folio, ítems o fecha de entrega.');return}
  if(!cotId){toast('Selecciona la cotización de origen.');return}
  if(DB[ARCH.oc].data.ordenes.some(o=>o.folio===folio)){toast('Ya existe una OC con ese folio.');return}
  velo(true,'Guardando OC…');
  try{
    DB[ARCH.oc].data.ordenes.push({folio,cotizacion_id:cotId,fecha_emision:v('o-femi'),fecha_entrega:v('o-fent'),destino:v('o-dest').trim(),cliente:DB[ARCH.conf].data.cliente_principal,items:items.map(i=>({...i,cantidad_comprada:0,cantidad_despachada:0})),compras:[],guias:[],archivo:null,notas:''});
    const c=DB[ARCH.cot].data.cotizaciones.find(x=>x.id===cotId);
    if(c){c.estado='convertida';c.oc_asociada=folio}
    await guardarArchivo(ARCH.oc,`OC ${folio} registrada`);
    await guardarArchivo(ARCH.cot,`Cotización ${c?c.folio:''} convertida en OC ${folio}`);
    toast('OC guardada ✓');render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function borrarOC(fe){
  const folio=decodeURIComponent(fe);
  const arr=DB[ARCH.oc].data.ordenes;const o=arr.find(x=>x.folio===folio);if(!o)return;
  if(o.guias?.length){toast(`La OC ${folio} tiene guías asociadas (${o.guias.join(', ')}). Elimina primero esas guías.`);return}
  const comprasBod=(o.compras||[]).filter(c=>c.ingreso_bodega);
  let msg=`¿Dar de baja la OC ${folio}?`;
  if(comprasBod.length)msg+=`\n\nSe revertirán del inventario los ingresos de sus ${comprasBod.length} compra(s) registrada(s).`;
  if(o.cotizacion_id)msg+=`\nSu cotización volverá al estado "enviada".`;
  if(!confirm(msg))return;
  velo(true,'Dando de baja…');
  try{
    const inv=DB[ARCH.inv].data;
    comprasBod.forEach(cp=>cp.items.forEach(it=>{
      const p=inv.productos.find(x=>x.nombre.trim().toLowerCase()===it.producto.trim().toLowerCase());
      if(p){p.cantidad-=it.cantidad;
        inv.movimientos.push({fecha:hoyISO(),tipo:'ajuste',producto:p.nombre,cantidad:-it.cantidad,referencia:`Reverso por baja de OC ${folio}`})}
    }));
    const c=DB[ARCH.cot].data.cotizaciones.find(x=>x.id===o.cotizacion_id);
    if(c){c.estado='enviada';c.oc_asociada=null}
    arr.splice(arr.indexOf(o),1);
    await guardarArchivo(ARCH.oc,`OC ${folio} dada de baja`);
    if(c)await guardarArchivo(ARCH.cot,`Cotización ${c.folio} liberada por baja de OC ${folio}`);
    if(comprasBod.length)await guardarArchivo(ARCH.inv,`Inventario: reverso por baja de OC ${folio}`);
    if(o.archivo)await borrarArchivoRepo(o.archivo,`Borrado documento de OC ${folio}`);
    toast(`OC ${folio} dada de baja ✓`);render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function borrarGuia(numero){
  const arr=DB[ARCH.guias].data.guias;const g=arr.find(x=>x.numero===numero);if(!g)return;
  let msg=`¿Eliminar la guía N°${numero}?\n\nSe devolverán sus cantidades al inventario y al pendiente de la OC ${g.folio_oc}.`;
  if(g.hoja_ruta)msg+=`\n⚠ Esta guía ya está en la Hoja de Ruta N°${g.hoja_ruta}.`;
  if(!confirm(msg))return;
  velo(true,'Eliminando guía…');
  try{
    const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===g.folio_oc);
    if(o){
      g.items.forEach(it=>{
        const oi=o.items.find(x=>x.producto.trim().toLowerCase()===it.producto.trim().toLowerCase());
        if(oi)oi.cantidad_despachada=Math.max(0,(+oi.cantidad_despachada||0)-it.cantidad);
      });
      o.guias=(o.guias||[]).filter(n=>n!==numero);
    }
    const inv=DB[ARCH.inv].data;
    g.items.forEach(it=>{
      let p=inv.productos.find(x=>x.nombre.trim().toLowerCase()===it.producto.trim().toLowerCase());
      if(!p){p={nombre:it.producto,cantidad:0,unidad:'un'};inv.productos.push(p)}
      p.cantidad+=it.cantidad;
      inv.movimientos.push({fecha:hoyISO(),tipo:'ingreso',producto:p.nombre,cantidad:it.cantidad,referencia:`Reverso por eliminación de guía N°${numero}`});
    });
    arr.splice(arr.indexOf(g),1);
    await guardarArchivo(ARCH.guias,`Guía N°${numero} eliminada`);
    if(o)await guardarArchivo(ARCH.oc,`OC ${g.folio_oc}: reverso de guía N°${numero}`);
    await guardarArchivo(ARCH.inv,`Inventario: reverso de guía N°${numero}`);
    toast(`Guía N°${numero} eliminada y cantidades devueltas ✓`);render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
function toggleCompra(fe){
  const folio=decodeURIComponent(fe);
  const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===folio);if(!o)return;
  const box=document.getElementById('fc-'+fe);
  if(box.innerHTML){box.innerHTML='';return}
  const pend=o.items.map((i,ix)=>({...i,ix,porComprar:(+i.cantidad||0)-(+i.cantidad_comprada||0)})).filter(i=>i.porComprar>0);
  box.innerHTML=`<div style="border-top:1.5px dashed var(--line);margin-top:12px;padding-top:4px">
    <div class="grid3">
      <div><label>Proveedor</label><input id="pc-prov-${fe}" placeholder="ej: Ferretería El Volcán"></div>
      <div><label>Fecha de compra</label><input id="pc-fecha-${fe}" type="date" value="${hoyISO()}"></div>
      <div><label>Bodega</label><label style="text-transform:none;font-weight:400;letter-spacing:0;display:flex;gap:8px;align-items:center;margin-top:8px;color:var(--ink)"><input type="checkbox" id="pc-bod-${fe}" checked style="width:auto"> Ingresar a inventario</label></div>
    </div>
    <table style="margin-top:4px"><tr><th>Producto</th><th class="num">Por comprar</th><th style="width:140px">Comprado ahora</th></tr>
    ${pend.map(i=>`<tr><td>${esc(i.producto)}</td><td class="num">${num(i.porComprar)}</td><td><input type="number" data-ix="${i.ix}" min="0" max="${i.porComprar}" step="any" placeholder="0"></td></tr>`).join('')}</table>
    <div class="acciones"><button class="btn mini" onclick="guardarCompra('${fe}')">Guardar compra</button><button class="btn mini sec" onclick="toggleCompra('${fe}')">Cancelar</button></div>
  </div>`;
}
async function guardarCompra(fe){
  const folio=decodeURIComponent(fe);
  const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===folio);if(!o)return;
  const box=document.getElementById('fc-'+fe);
  const prov=document.getElementById('pc-prov-'+fe).value.trim();
  const fecha=document.getElementById('pc-fecha-'+fe).value||hoyISO();
  const aBodega=document.getElementById('pc-bod-'+fe).checked;
  const filas=[...box.querySelectorAll('input[type=number]')].map(inp=>({ix:+inp.dataset.ix,cant:+inp.value||0})).filter(f=>f.cant>0);
  if(!filas.length){toast('Indica al menos una cantidad comprada.');return}
  for(const f of filas){const it=o.items[f.ix];const pc=(+it.cantidad||0)-(+it.cantidad_comprada||0);
    if(f.cant>pc){toast(`"${it.producto}": lo pendiente de compra es ${num(pc)}.`);return}}
  velo(true,'Registrando compra…');
  try{
    const itemsC=filas.map(f=>({producto:o.items[f.ix].producto,cantidad:f.cant}));
    filas.forEach(f=>{o.items[f.ix].cantidad_comprada=(+o.items[f.ix].cantidad_comprada||0)+f.cant});
    o.compras=o.compras||[];o.compras.push({fecha,proveedor:prov,ingreso_bodega:aBodega,items:itemsC});
    if(aBodega){
      const inv=DB[ARCH.inv].data;
      itemsC.forEach(it=>{
        let p=inv.productos.find(x=>x.nombre.trim().toLowerCase()===it.producto.trim().toLowerCase());
        if(!p){p={nombre:it.producto,cantidad:0,unidad:'un'};inv.productos.push(p)}
        p.cantidad+=it.cantidad;
        inv.movimientos.push({fecha,tipo:'ingreso',producto:p.nombre,cantidad:it.cantidad,referencia:`Compra OC ${folio}${prov?' · '+prov:''}`});
      });
    }
    await guardarArchivo(ARCH.oc,`OC ${folio}: compra registrada${prov?' ('+prov+')':''}`);
    if(aBodega)await guardarArchivo(ARCH.inv,`Inventario: ingreso por compra OC ${folio}`);
    toast('Compra registrada ✓');render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

      <span class="muted small">${esc(g.destino||'')}</span>
      ${g.hoja_ruta?`<span class="chip verde">Hoja de ruta N°${g.hoja_ruta}</span>`:'<span class="chip ambar">Sin hoja de ruta</span>'}
      <button class="btn mini peligro" style="margin-left:auto" onclick="borrarGuia('${esc(g.numero)}')">Eliminar</button>
    </div>
    <table style="margin-top:8px"><tr><th>Producto</th><th class="num">Cantidad</th></tr>
    ${g.items.map(i=>`<tr><td>${esc(i.producto)}</td><td class="num">${num(i.cantidad)}</td></tr>`).join('')}</table>
  </div>`).join(''):'<div class="card vacio">Aún no hay guías registradas.</div>'}`;
}
function prepFormGuia(){
  const sel=document.getElementById('g-oc');
  sel.addEventListener('change',()=>{
    const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===sel.value);
    const box=document.getElementById('g-items-box');
    if(!o){box.innerHTML='';return}
    document.getElementById('g-dest').value=o.destino||'';
    const pend=o.items.map((i,ix)=>({...i,ix,pendiente:(+i.cantidad||0)-(+i.cantidad_despachada||0)})).filter(i=>i.pendiente>0);
    box.innerHTML=`<label>Cantidades a despachar</label>
      <table><tr><th>Producto</th><th class="num">Pendiente</th><th style="width:130px">Despachar</th></tr>
      ${pend.map(i=>`<tr><td>${esc(i.producto)}</td><td class="num">${num(i.pendiente)}</td>
        <td><input type="number" class="g-cant" data-ix="${i.ix}" min="0" max="${i.pendiente}" step="any" value="${i.pendiente}"></td></tr>`).join('')}</table>`;
  });
}
async function crearGuia(){
  const numero=v('g-num').trim(),folioOC=v('g-oc'),fecha=v('g-fecha'),destino=v('g-dest').trim();
  if(!numero||!folioOC){toast('Falta el N° de guía o la OC.');return}
  if(DB[ARCH.guias].data.guias.some(g=>g.numero===numero)){toast('Ya existe una guía con ese número.');return}
  const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===folioOC);
  const filas=[...document.querySelectorAll('.g-cant')].map(inp=>({ix:+inp.dataset.ix,cant:+inp.value||0})).filter(f=>f.cant>0);
  if(!filas.length){toast('Indica al menos una cantidad a despachar.');return}
  for(const f of filas){const it=o.items[f.ix];const pend=(+it.cantidad||0)-(+it.cantidad_despachada||0);
    if(f.cant>pend){toast(`"${it.producto}": no puedes despachar más de ${num(pend)}.`);return}}
  velo(true,'Registrando despacho…');
  try{
    const itemsGuia=filas.map(f=>({producto:o.items[f.ix].producto,cantidad:f.cant}));
    // 1. Guía
    DB[ARCH.guias].data.guias.push({numero,fecha,destino,folio_oc:folioOC,items:itemsGuia,hoja_ruta:null});
    // 2. Avance OC
    filas.forEach(f=>{o.items[f.ix].cantidad_despachada=(+o.items[f.ix].cantidad_despachada||0)+f.cant});
    o.guias=o.guias||[];o.guias.push(numero);
    // 3. Inventario
    const inv=DB[ARCH.inv].data;let negativos=[];
    itemsGuia.forEach(it=>{
      let p=inv.productos.find(x=>x.nombre.trim().toLowerCase()===it.producto.trim().toLowerCase());
      if(!p){p={nombre:it.producto,cantidad:0,unidad:'un'};inv.productos.push(p)}
      p.cantidad-=it.cantidad;if(p.cantidad<0)negativos.push(p.nombre);
      inv.movimientos.push({fecha,tipo:'salida',producto:p.nombre,cantidad:it.cantidad,referencia:`Guía N°${numero} · OC ${folioOC}`});
    });
    await guardarArchivo(ARCH.guias,`Guía N°${numero} registrada (OC ${folioOC})`);
    await guardarArchivo(ARCH.oc,`OC ${folioOC}: despacho guía N°${numero}`);
    await guardarArchivo(ARCH.inv,`Inventario: salida por guía N°${numero}`);
    toast('Despacho registrado ✓'+(negativos.length?` ⚠ Stock negativo: ${negativos.join(', ')}`:''));
    render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

/* ================= Inventario ================= */
function rInv(){
  const inv=DB[ARCH.inv].data;
  const prods=[...inv.productos].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const movs=[...inv.movimientos].reverse().slice(0,40);
  return `${dlProd()}
  <details class="form"><summary>Registrar ingreso a bodega</summary><div class="inner">
    <div class="grid3">
      <div><label>Producto</label><input id="i-prod" list="dl-prod"></div>
      <div><label>Cantidad</label><input id="i-cant" type="number" min="0" step="any"></div>
      <div><label>Referencia</label><input id="i-ref" placeholder="ej: Factura proveedor 1234"></div>
    </div>
    <div class="acciones"><button class="btn" onclick="ingresoInv()">Registrar ingreso</button></div>
  </div></details>
  <h2>Stock actual (${prods.length} productos)</h2>
  <div class="card">${prods.length?`<table><tr><th>Producto</th><th class="num">Cantidad</th><th class="num">Ajustar</th></tr>
    ${prods.map(p=>`<tr><td>${esc(p.nombre)}</td><td class="num" style="font-weight:600;${p.cantidad<0?'color:var(--rojo)':''}">${num(p.cantidad)}</td>
    <td class="num"><button class="btn mini sec" onclick="ajusteInv('${esc(p.nombre).replace(/'/g,"\\'")}')">✎</button> <button class="btn mini peligro" onclick="borrarProd('${esc(p.nombre).replace(/'/g,"\\'")}')">🗑</button></td></tr>`).join('')}</table>`
    :'<div class="vacio">Bodega sin productos registrados. Usa "Registrar ingreso" para la carga inicial.</div>'}</div>
  <h2>Últimos movimientos</h2>
  <div class="card">${movs.length?`<table><tr><th>Fecha</th><th>Tipo</th><th>Producto</th><th class="num">Cant.</th><th>Referencia</th></tr>
    ${movs.map(m=>`<tr><td class="mono small">${fFecha(m.fecha)}</td><td><span class="chip ${m.tipo==='salida'?'rojo':m.tipo==='ingreso'?'verde':''}">${m.tipo}</span></td><td>${esc(m.producto)}</td><td class="num">${num(m.cantidad)}</td><td class="small muted">${esc(m.referencia||'')}</td></tr>`).join('')}</table>`
    :'<div class="vacio">Sin movimientos aún.</div>'}</div>`;
}
async function ingresoInv(){
  const nombre=v('i-prod').trim(),cant=+v('i-cant');
  if(!nombre||!(cant>0)){toast('Falta producto o cantidad.');return}
  const inv=DB[ARCH.inv].data;
  let p=inv.productos.find(x=>x.nombre.trim().toLowerCase()===nombre.toLowerCase());
  if(!p){p={nombre,cantidad:0,unidad:'un'};inv.productos.push(p)}
  p.cantidad+=cant;
  inv.movimientos.push({fecha:hoyISO(),tipo:'ingreso',producto:p.nombre,cantidad:cant,referencia:v('i-ref').trim()});
  velo(true);
  try{await guardarArchivo(ARCH.inv,`Inventario: ingreso ${nombre} (+${cant})`);toast('Ingreso registrado ✓');render()}
  catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function borrarProd(nombre){
  const inv=DB[ARCH.inv].data;
  const p=inv.productos.find(x=>x.nombre===nombre);if(!p)return;
  let msg=`¿Eliminar el producto "${nombre}" del inventario?`;
  if(p.cantidad!==0)msg+=`\n⚠ Tiene stock ${num(p.cantidad)} — se descartará ese saldo.`;
  if(!confirm(msg))return;
  inv.productos.splice(inv.productos.indexOf(p),1);
  inv.movimientos.push({fecha:hoyISO(),tipo:'ajuste',producto:nombre,cantidad:-p.cantidad,referencia:'Producto eliminado del inventario'});
  velo(true,'Eliminando…');
  try{await guardarArchivo(ARCH.inv,`Inventario: producto "${nombre}" eliminado`);toast('Producto eliminado ✓');render()}
  catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function ajusteInv(nombre){
  const inv=DB[ARCH.inv].data;
  const p=inv.productos.find(x=>x.nombre===nombre);if(!p)return;
  const nv=prompt(`Nueva cantidad para "${nombre}" (actual: ${p.cantidad}):`,p.cantidad);
  if(nv===null||nv==='')return;
  const dif=+nv-p.cantidad;p.cantidad=+nv;
  inv.movimientos.push({fecha:hoyISO(),tipo:'ajuste',producto:nombre,cantidad:dif,referencia:'Ajuste manual'});
  velo(true);
  try{await guardarArchivo(ARCH.inv,`Inventario: ajuste ${nombre} → ${nv}`);toast('Ajuste guardado ✓');render()}
  catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

/* ================= Arranque ================= */
async function iniciar(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hoy-lbl').textContent=new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  velo(true,'Cargando datos…');
  try{await cargarTodo();render()}
  catch(e){toast('Error al cargar datos: '+e.message)}
  velo(false);
}
(function(){
  const saved=localStorage.getItem(LSKEY);
  if(saved){cfg=JSON.parse(saved);iniciar()}
  else document.getElementById('setup').style.display='block';
})();
</script>
