<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novetec · Gestión de Despacho</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Tema claro (por defecto) */
  --ink:#16232E; --texto:#16232E; --paper:#F1F3F5; --card:#FFFFFF; --line:#D5DBE1; --muted:#5D6B77;
  --barra:#16232E; --btn-bg:#16232E; --btn-fg:#FFFFFF; --btn-bg-h:#0E1820;
  --campo:#FFFFFF; --hover:#EEF3F7; --sub-bg:#FAFBFC;
  --rojo:#C7392F; --rojo-bg:#FBEAE8; --ambar:#B57708; --ambar-bg:#FCF3E1;
  --verde:#2E7D4F; --verde-bg:#E7F3EC; --gris-bg:#EAEDF0; --vencida:#7A1F17;
  --radius:10px; --mono:'IBM Plex Mono',ui-monospace,monospace; --sans:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  /* Escala tipográfica (guía Learn UI Design, diseño interaction-heavy).
     16px es el piso del cuerpo y de TODOS los campos: bajo eso iOS hace zoom al tocarlos.
     --escala la controla el botón de zoom de la barra superior (1 · 1,15 · 1,3). */
  --escala:1;
  --fs-xs:calc(12.5px * var(--escala)); --fs-sm:calc(14px * var(--escala));
  --fs-md:calc(16px * var(--escala)); --fs-base:calc(16px * var(--escala));
  --fs-lg:calc(18px * var(--escala));
}
/* Tema oscuro */
html[data-tema="oscuro"]{
  --ink:#E4EBF1; --texto:#E4EBF1; --paper:#0E151C; --card:#16202B; --line:#2B3846; --muted:#93A5B6;
  --barra:#080D12; --btn-bg:#E4EBF1; --btn-fg:#0E151C; --btn-bg-h:#FFFFFF;
  --campo:#0F1821; --hover:#1E2A37; --sub-bg:#131C25;
  --rojo:#F0897D; --rojo-bg:#3B1D19; --ambar:#E0A94D; --ambar-bg:#352712;
  --verde:#6FCB95; --verde-bg:#123021; --gris-bg:#243040; --vencida:#5E1811;
}
html[data-tema="oscuro"] #splash img{filter:brightness(1.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--texto);font-size:var(--fs-base);line-height:1.55;-webkit-font-smoothing:antialiased}
header{background:var(--barra);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:800;letter-spacing:.09em;text-transform:uppercase}
header .sub{font-family:var(--mono);font-size:var(--fs-sm);color:#9FB0BE;letter-spacing:.02em}
header .conn{font-family:var(--mono);font-size:var(--fs-xs);color:#9FB0BE;cursor:pointer;text-decoration:underline dotted}
/* Acciones de la barra: botones redondos */
.hacciones{margin-left:auto;display:flex;align-items:center;gap:10px}
.hbtn{width:38px;height:38px;flex:none;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#E4EBF1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;overflow:hidden;position:relative;transition:background .15s,border-color .15s}
.hbtn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.45)}
.hbtn img{width:100%;height:100%;object-fit:cover;display:block}
.hbtn i{font-size:15px}
.hbtn .nivel{position:absolute;bottom:-1px;right:-1px;background:var(--btn-bg);color:var(--btn-fg);font-family:var(--mono);font-size:9.5px;font-weight:600;line-height:1;padding:2px 3px;border-radius:6px}
@media(max-width:640px){.hacciones .conn{display:none}}
nav{background:var(--card);border-bottom:1px solid var(--line);display:flex;overflow-x:auto;position:sticky;top:0;z-index:10}
nav button{font-family:var(--sans);font-size:var(--fs-md);font-weight:600;letter-spacing:.01em;padding:14px 18px;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:color .15s}
nav button:hover{color:var(--texto)}
nav button.on{color:var(--texto);border-bottom-color:var(--texto);font-weight:700}
main{max-width:1080px;margin:0 auto;padding:24px 16px 80px}
h2{font-size:var(--fs-lg);font-weight:700;letter-spacing:-.005em;margin:34px 0 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;line-height:1.3}
h2:first-child{margin-top:0}
h2 .muted{font-size:var(--fs-sm);font-weight:400}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;overflow-x:auto}
.card>table:first-child{margin-top:-2px}
.mono{font-family:var(--mono);letter-spacing:-.01em}
.muted{color:var(--muted)}
.small{font-size:var(--fs-sm)}
/* Rótulo de bodega dentro de una tarjeta: mismo cuerpo que el resto del texto */
.bodega-lbl{font-size:var(--fs-base);font-weight:700;color:var(--texto);display:flex;align-items:center;gap:7px;margin:20px 0 8px}
.bodega-lbl:first-child{margin-top:8px}
.bodega-lbl .muted{font-weight:400;font-size:var(--fs-sm)}
button.btn{font-family:var(--sans);font-weight:700;font-size:var(--fs-sm);letter-spacing:.01em;background:var(--btn-bg);color:var(--btn-fg);border:none;border-radius:8px;padding:10px 17px;cursor:pointer;transition:background .15s}
button.btn:hover{background:var(--btn-bg-h)}
button.btn.sec{background:none;color:var(--texto);border:1.5px solid var(--texto)}
button.btn.mini{padding:7px 12px;font-size:var(--fs-xs)}
button.btn.peligro{background:none;border:1.5px solid var(--rojo);color:var(--rojo)}
input,select,textarea{font-family:var(--mono);font-size:var(--fs-base);padding:10px 11px;border:1px solid var(--line);border-radius:7px;background:var(--campo);color:var(--texto);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--texto);outline-offset:1px}
label{display:block;font-size:var(--fs-xs);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:15px 0 6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr}}
/* Semáforo */
.sem-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:640px){.sem-strip{grid-template-columns:repeat(2,1fr)}}
.sem-box{border-radius:var(--radius);padding:14px;border:1px solid var(--line);background:var(--card)}
.sem-box .n{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1}
.sem-box .l{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:6px}
.sem-box.rojo{background:var(--rojo-bg)}.sem-box.rojo .n,.sem-box.rojo .l{color:var(--rojo)}
.sem-box.ambar{background:var(--ambar-bg)}.sem-box.ambar .n,.sem-box.ambar .l{color:var(--ambar)}
.sem-box.verde{background:var(--verde-bg)}.sem-box.verde .n,.sem-box.verde .l{color:var(--verde)}
.sem-box.vencida{background:var(--vencida)}.sem-box.vencida .n,.sem-box.vencida .l{color:#fff}
/* Etiqueta de carga (fila OC) */
.tag{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;display:flex;overflow:hidden}
.tag .bar{width:7px;flex:none}
.tag .bar.rojo{background:var(--rojo)}.tag .bar.ambar{background:var(--ambar)}.tag .bar.verde{background:var(--verde)}
.tag .bar.vencida{background:var(--vencida)}.tag .bar.gris{background:#AEB9C2}
.tag .body{flex:1;padding:12px 14px;min-width:0}
.tag .top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.tag .folio{font-family:var(--mono);font-weight:700;font-size:var(--fs-lg);letter-spacing:-.01em}
.chip{display:inline-block;font-family:var(--mono);font-size:var(--fs-xs);font-weight:600;padding:3px 10px;border-radius:20px;background:var(--gris-bg);color:var(--muted);white-space:nowrap}
.chip.rojo{background:var(--rojo-bg);color:var(--rojo)}
.chip.ambar{background:var(--ambar-bg);color:var(--ambar)}
.chip.verde{background:var(--verde-bg);color:var(--verde)}
.chip.vencida{background:var(--vencida);color:#fff}
.chip.ink{background:var(--btn-bg);color:var(--btn-fg)}
table{width:100%;border-collapse:collapse;font-size:var(--fs-sm);line-height:1.4}
th{font-size:var(--fs-xs);font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--line);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
td .small{font-size:var(--fs-xs);line-height:1.4}
td .small.sep::before{content:'·';color:var(--line);margin:0 5px}
/* Celda de una sola línea: si el texto no cabe, se corta con puntos suspensivos.
   Al hacer clic se despliega completo (puede ocupar más de una línea). */
td.trunc{max-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
/* Grilla estándar de TODA la app (Jefe, 22-07-2026): las columnas de cifras y de acción llevan
   ancho fijo y el NOMBRE DEL PRODUCTO se queda con todo el espacio sobrante. Los anchos van en
   ch para que acompañen al botón de zoom de la barra. */
table.tprod{table-layout:fixed}
table.tprod th{white-space:normal;vertical-align:bottom}
table.tprod td.trunc{max-width:none}
table.tprod td,table.tprod th{padding-left:8px;padding-right:8px}
table.tprod td:first-child,table.tprod th:first-child{padding-left:2px}
table.tprod td:last-child,table.tprod th:last-child{padding-right:2px}
.aviso-medida{color:var(--ambar);margin-right:5px;cursor:help}
/* Alerta roja junto a una cifra (ej: se despachó más de lo comprado) */
.alerta-cifra{color:var(--rojo);margin-left:5px;cursor:help}
/* Acordeón de guías: bodega -> fecha -> guías de ese día */
.acc-bodega{margin-bottom:12px}
.acc-fecha>summary{list-style:none;cursor:pointer;padding:11px 14px;border:1px solid var(--line);border-radius:8px;background:var(--card);display:flex;align-items:center;gap:10px;margin-top:8px;font-weight:600}
.acc-fecha>summary::-webkit-details-marker{display:none}
.acc-fecha>summary::before{content:'\f105';font-family:'Font Awesome 6 Free';font-weight:900;color:var(--muted);transition:transform .15s}
.acc-fecha[open]>summary::before{transform:rotate(90deg)}
.acc-fecha>summary .cnt{margin-left:auto;font-family:var(--mono);font-size:var(--fs-xs);color:var(--muted);font-weight:400}
.acc-fecha .cuerpo{padding:6px 0 4px 6px}
td.trunc:hover{background:var(--hover)}
td.trunc.abierto{white-space:normal;overflow:visible;text-overflow:clip;background:var(--hover)}
td.num,th.num{text-align:right;font-family:var(--mono);letter-spacing:-.01em}
.item-row{display:grid;grid-template-columns:1fr 110px 130px 34px;gap:8px;margin-bottom:8px}
@media(max-width:640px){.item-row{grid-template-columns:1fr 80px 100px 30px}}
.item-row button{border:none;background:none;color:var(--rojo);font-size:18px;cursor:pointer}
.acciones{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
.vacio{text-align:center;color:var(--muted);padding:32px;font-size:var(--fs-sm)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--btn-bg);color:var(--btn-fg);font-family:var(--mono);font-size:var(--fs-sm);padding:13px 18px;border-radius:8px;display:none;z-index:99;max-width:90vw}
#velo{position:fixed;inset:0;background:rgba(22,35,46,.35);display:none;align-items:center;justify-content:center;z-index:50;font-family:var(--mono);color:#fff;font-size:var(--fs-md)}
#splash{position:fixed;inset:0;background:var(--paper);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:200;opacity:1;transition:opacity .6s ease}
#splash.out{opacity:0;pointer-events:none}
#splash img{width:min(46vw,260px);animation:splashIn .7s ease}
@keyframes splashIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-ov{position:fixed;inset:0;background:rgba(22,35,46,.45);display:flex;align-items:center;justify-content:center;z-index:120;padding:16px}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;max-width:460px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.25)}
.modal .cand{display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--campo);border-radius:8px;padding:11px 13px;margin-top:8px;cursor:pointer;font-family:var(--sans);font-size:var(--fs-sm);line-height:1.4}
.modal .cand:hover{border-color:var(--texto);background:var(--hover)}
.modal .cand.nuevo{border-style:dashed;color:var(--muted);margin-top:14px}
.dropzone{border:2px dashed var(--line);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;background:var(--campo);transition:all .15s}
.dropzone.hover{border-color:var(--texto);background:var(--hover)}
.dropzone .dz-icono{font-size:26px;color:var(--muted);margin-bottom:6px}
details.form{border:1.5px dashed var(--line);border-radius:var(--radius);margin-bottom:16px;background:var(--sub-bg)}
details.form summary{padding:14px 16px;font-weight:700;font-size:var(--fs-base);letter-spacing:0;cursor:pointer;list-style:none}
details.form summary::before{content:'+ '}
details.form[open] summary::before{content:'– '}
details.form .inner{padding:0 16px 16px}
.filtro{margin-bottom:12px}
#setup{max-width:460px;margin:60px auto;padding:0 16px}
#setup .card{padding:26px}
#setup h1{font-size:20px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
a{color:var(--texto)}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <div class="card">
    <h1>Novetec · Gestión</h1>
    <p class="muted small">Conecta la app con el repositorio privado de datos. El token queda guardado solo en este navegador.</p>
    <label>Usuario u organización de GitHub</label>
    <input id="s-owner" placeholder="ej: novetec-spa">
    <label>Repositorio de datos</label>
    <input id="s-repo" placeholder="novetec-datos">
    <label>Token de acceso (fine-grained)</label>
    <input id="s-token" type="password" placeholder="github_pat_...">
    <div class="acciones"><button class="btn" onclick="conectar()">Conectar</button></div>
    <p id="s-err" class="small" style="color:var(--rojo);margin-top:10px"></p>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <h1>Novetec · Despacho</h1>
  <span class="sub" id="hoy-lbl"></span>
  <div class="hacciones">
    <button class="hbtn" id="btn-tema" onclick="alternarTema()" title="Modo oscuro" aria-label="Modo oscuro"><img src="logo-marca.png" alt=""></button>
    <button class="hbtn" id="btn-zoom" onclick="ciclarZoom()" title="Ampliar la vista" aria-label="Ampliar la vista"><i class="fa-solid fa-magnifying-glass-plus"></i><span class="nivel" id="zoom-nivel" style="display:none"></span></button>
    <span class="conn" onclick="cambiarConexion()">cambiar conexión</span>
  </div>
</header>
<nav id="tabs">
  <button data-t="panel" class="on">Panel</button>
  <button data-t="cot">Cotizaciones</button>
  <button data-t="oc">Órdenes de compra</button>
  <button data-t="guias">Guías de despacho</button>
  <button data-t="inv">Inventario</button>
</nav>
<main id="vista"></main>
</div>

<div id="splash"><img src="logo.png" alt="Novetec SPA"></div>
<div id="toast"></div>
<div id="velo"><span id="velo-msg">Guardando…</span></div>

<script>
/* ================= Conexión GitHub ================= */
const LSKEY='novetec_cfg';
let cfg=null;
let DB={}; // path -> {data, sha}
const ARCH={cot:'data/cotizaciones.json',oc:'data/ordenes_compra.json',guias:'data/guias_despacho.json',inv:'data/inventario.json',conf:'data/config.json',pend:'data/pendientes.json',hr:'data/hojas_ruta.json',prod:'data/productos.json',sin:'data/sinonimos.json',psap:'data/pendientes_sap.json',arch:'data/archivos.json'};

const b64dec=s=>new TextDecoder().decode(Uint8Array.from(atob(s.replace(/\s/g,'')),c=>c.charCodeAt(0)));
function b64enc(s){const b=new TextEncoder().encode(s);let r='';for(let i=0;i<b.length;i+=8192)r+=String.fromCharCode(...b.subarray(i,i+8192));return btoa(r)}

async function gh(path,opts={}){
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/${path}`,{
    ...opts,headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`${r.status}: ${e.message||'error de GitHub'}`)}
  return r.json();
}
const ESTRUCTURAS_BASE={'data/cotizaciones.json':{cotizaciones:[]},'data/ordenes_compra.json':{ordenes:[]},
 'data/guias_despacho.json':{guias:[]},'data/inventario.json':{productos:[],movimientos:[]},
 'data/pendientes.json':{pendientes:[]},'data/hojas_ruta.json':{hojas:[]},
 'data/productos.json':{productos:[],correlativo:0},
 'data/pendientes_sap.json':{registros:[],actualizado:null,archivo_origen:null},
 'data/archivos.json':{archivos:[]},
 'data/config.json':{empresa:'Novetec SPA',semaforo:{rojo_dias:5,amarillo_dias:10},proxima_hoja_ruta:1}};
async function cargarArchivo(p){
  try{
    const j=await gh(`contents/${p}?t=${Date.now()}`);
    DB[p]={data:JSON.parse(b64dec(j.content)),sha:j.sha};
  }catch(e){
    // Auto-recuperación: si el archivo no existe, la app lo crea con estructura vacía
    if(e.message.startsWith('404')&&ESTRUCTURAS_BASE[p]){
      DB[p]={data:JSON.parse(JSON.stringify(ESTRUCTURAS_BASE[p])),sha:undefined};
      try{const j=await gh(`contents/${p}`,{method:'PUT',body:JSON.stringify({message:'Inicialización automática: '+p,content:b64enc(JSON.stringify(DB[p].data,null,2))})});DB[p].sha=j.content.sha}catch(_){/* seguir en memoria */}
    } else throw e;
  }
}
async function guardarArchivo(p,msg){
  try{
    const j=await gh(`contents/${p}`,{method:'PUT',body:JSON.stringify({message:msg,content:b64enc(JSON.stringify(DB[p].data,null,2)),sha:DB[p].sha})});
    DB[p].sha=j.content.sha;
  }catch(e){
    if(e.message.startsWith('409')||e.message.startsWith('422')){
      toast('Atención: otro usuario guardó cambios. Recargando datos…');await cargarTodo();render();throw new Error('conflicto');
    }
    throw e;
  }
}
async function subirDocumento(carpeta,file,nombreFijo){
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
  const ruta=`documentos/${carpeta}/${nombreFijo||(Date.now()+'_'+file.name.replace(/[^\w.\-]/g,'_'))}`;
  await gh(`contents/${ruta}`,{method:'PUT',body:JSON.stringify({message:`Documento: ${file.name}`,content:b64})});
  return ruta;
}
async function borrarArchivoRepo(p,msg){
  try{const j=await gh(`contents/${encodeURI(p)}?t=${Date.now()}`);
    await gh(`contents/${encodeURI(p)}`,{method:'DELETE',body:JSON.stringify({message:msg,sha:j.sha})});
  }catch(e){/* si el archivo ya no existe, continuar */}
}
function bajarBlob(b,nombre){
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=nombre;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(u),5000);
  velo(false);
}
async function descargarArchivo(p,nombre){
  if(!p||p==='null'||p==='undefined'){toast('Ese documento todavía no tiene archivo generado.');return}
  velo(true,'Descargando…');
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURI(p)}?t=${Date.now()}`,
      {headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github.raw'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const b=await r.blob();
    if(b.type.includes('json')&&!/\.json$/i.test(p)){
      const t=await b.text();
      try{const j=JSON.parse(t);
        if(j.content){ // la API respondió en JSON: rearmamos el binario desde base64
          const bin=atob(j.content.replace(/\s/g,''));
          const arr=new Uint8Array(bin.length);
          for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
          return bajarBlob(new Blob([arr]),nombre||p.split('/').pop());
        }
      }catch(_){}
      throw new Error('el servidor no devolvió el archivo');
    }
    const u=URL.createObjectURL(b);

/* Maestro de productos: sin duplicados, codigo propio NOV-#### */
const normProd=s=>String(s||'').toUpperCase().replace(/[^A-Z0-9 ]/g,'').replace(/\s+/g,' ').trim();
function prodMaestro(nombre){const n=normProd(nombre);
  return DB[ARCH.prod].data.productos.find(p=>normProd(p.nombre)===n||(p.alias||[]).some(a=>normProd(a)===n))}
function crearProdMaestro(nombre,unidad){const d=DB[ARCH.prod].data;d.correlativo++;
  const p={codigo:'NOV-'+String(d.correlativo).padStart(4,'0'),nombre:nombre.trim(),unidad:(unidad||'UN').toUpperCase(),codigos_cliente:{},alias:[]};
  d.productos.push(p);DB[ARCH.prod]._nuevos=true;return p}
function invProdDe(nombre,unidad,crear=true){
  let m=prodMaestro(nombre);
  if(!m){if(!crear)return null;m=crearProdMaestro(nombre,unidad)}
  let p=DB[ARCH.inv].data.productos.find(x=>x.codigo===m.codigo);
  if(!p&&crear){p={codigo:m.codigo,nombre:m.nombre,cantidad:0,unidad:m.unidad};DB[ARCH.inv].data.productos.push(p)}
  return p}

/* Similitud simple para desambiguar nombres parecidos */
// Lematiza a raíz simple: minúsculas sin tildes y sin plural (lapices a lapiz aproximado)
function raiz(t){t=t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  t=t.replace(/ces$/,'z').replace(/es$/,'').replace(/s$/,'');return t}
function tokens(s){return normProd(s).split(' ').filter(t=>t.length>2).map(raiz)}
function expandirSinonimos(toks){
  const grupos=(DB[ARCH.sin]&&DB[ARCH.sin].data.grupos)||[];
  const set=new Set(toks);
  toks.forEach(t=>{grupos.forEach(g=>{const gr=g.map(raiz);if(gr.includes(t))gr.forEach(x=>set.add(x))})});
  return [...set];}
function candidatosMaestro(nombre){
  const tq=expandirSinonimos(tokens(nombre)); if(!tq.length)return [];
  return DB[ARCH.prod].data.productos
    .map(p=>{
      const nombres=[p.nombre,...(p.alias||[])];
      let mejor=0;
      nombres.forEach(nm=>{const tn=tokens(nm);
        const comp=tq.filter(t=>tn.includes(t)).length;
        if(!comp)return;
        // relevancia: proporción de tokens de la búsqueda cubiertos + del nombre cubiertos
        const score=(comp/tq.length)*0.6 + (comp/tn.length)*0.4;
        if(score>mejor)mejor=score;});
      return {p,s:mejor};
    })
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s)
    .map(x=>x.p);}
// Devuelve el producto del maestro elegido (exacto, o vía modal si hay similares), o {crear:nombre}
function resolverProducto(nombre){
  return new Promise(res=>{
    const exacto=prodMaestro(nombre);
    if(exacto){res(exacto);return}
    const cand=candidatosMaestro(nombre);
    if(!cand.length){res({crear:nombre});return}
    const ov=document.createElement('div');ov.className='modal-ov';
    const filtro=cand.length>8?`<input id="cand-filtro" placeholder="Filtrar lista…" style="margin:8px 0">`:'';
    ov.innerHTML=`<div class="modal">
      <b>¿A qué producto corresponde?</b>
      <p class="small muted">Escribiste "<b>${esc(nombre)}</b>". Hay ${cand.length} producto(s) similar(es) en el maestro — elige el correcto para ingresar/descontar sobre ese código, o créalo como nuevo si ninguno corresponde.</p>
      ${filtro}
      <div id="cand-list" style="max-height:46vh;overflow-y:auto">${cand.map((p,i)=>`<button class="cand" data-i="${i}"><span class="mono small">${esc(p.codigo)}</span> ${esc(p.nombre)} <span class="mono small muted">· ${esc(p.unidad)}</span>${p.alias&&p.alias.length?`<br><span class="small muted">alias: ${esc(p.alias.slice(0,2).join(', '))}</span>`:''}</button>`).join('')}</div>
      <button class="cand nuevo" data-i="-1">+ Crear "<b>${esc(nombre)}</b>" como producto NUEVO (distinto a los de arriba)</button>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelectorAll('.cand').forEach(b=>b.onclick=()=>{const i=+b.dataset.i;ov.remove();res(i<0?{crear:nombre}:cand[i]);});
    const fi=ov.querySelector('#cand-filtro');
    if(fi)fi.oninput=()=>{const q=normProd(fi.value);
      ov.querySelectorAll('#cand-list .cand').forEach(b=>{b.style.display=normProd(b.textContent).includes(q)?'block':'none'})};
  });
}


/* Estado y semaforo de OC */
function ocTot(oc){return oc.items.reduce((s,i)=>s+(+i.cantidad||0),0)}
function ocDesp(oc){return oc.items.reduce((s,i)=>s+(+i.cantidad_despachada||0),0)}
function ocEstado(oc){const t=ocTot(oc),d=ocDesp(oc);return d<=0?'pendiente':(d<t?'parcial':'despachada')}
function ocComp(oc){return oc.items.reduce((s,i)=>s+(+i.cantidad_comprada||0),0)}
function chipCompra(oc){const t=ocTot(oc),c=ocComp(oc);
  if(c<=0)return '<span class="chip rojo">Compra pendiente</span>';
  if(c<t)return `<span class="chip ambar">Compra parcial ${num(c)}/${num(t)}</span>`;
  return '<span class="chip ink">Comprada</span>'}
function semaforo(oc){
  if(ocEstado(oc)==='despachada')return {c:'gris',txt:'despachada'};
  const dd=dias(oc.fecha_entrega);
  const s=DB[ARCH.conf].data.semaforo||{rojo_dias:5,amarillo_dias:10};
  if(dd===null)return {c:'gris',txt:'sin fecha'};
  if(dd<0)return {c:'vencida',txt:`vencida ${Math.abs(dd)} d`};
  if(dd<=s.rojo_dias)return {c:'rojo',txt:`${dd} días`};
  if(dd<=s.amarillo_dias)return {c:'ambar',txt:`${dd} días`};
  return {c:'verde',txt:`${dd} días`};
}

/* Huella SHA-256 del archivo: es lo que permite reconocer un documento ya cargado
   aunque venga con otro nombre (Jefe, 22-07-2026). */
async function huella(file){
  const buf=await file.arrayBuffer();
  const h=await crypto.subtle.digest('SHA-256',buf);
  return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function subirPendiente(tipo){
  let files=[...document.getElementById('pd-file-'+tipo).files];
  if(!files.length){toast('Selecciona al menos un archivo.');return}
  velo(true,'Revisando si ya fueron cargados…');
  try{
    const nota=v('pd-nota-'+tipo).trim();
    const fenvEl=document.getElementById('pd-fenv-'+tipo);
    const fenv=fenvEl?fenvEl.value:null;
    if(tipo==='guias_despacho'&&!fenv){velo(false);toast('Indica la fecha de envío del viaje.');return}

    // 1. Huella de cada archivo y cruce contra el registro y contra la propia tanda
    const reg=(DB[ARCH.arch]&&DB[ARCH.arch].data.archivos)||[];
    const hs=[];
    for(const f of files) hs.push({file:f,h:await huella(f)});
    const dups=[],nuevos=[],vistos=new Set();
    hs.forEach(x=>{
      const previo=reg.find(r=>r.hash===x.h);
      const repetidoEnTanda=vistos.has(x.h);
      vistos.add(x.h);
      if(previo) dups.push({...x,reg:previo});
      else if(repetidoEnTanda) dups.push({...x,reg:{estado:'duplicado',nombre:x.file.name,referencia:'repetido dentro de esta misma subida'}});
      else nuevos.push(x);
    });
    if(dups.length){
      velo(false);
      const q=await modalDuplicados(dups,nuevos);
      if(!q)return;
      files=(q==='omitir'?nuevos:hs).map(x=>x.file);
      if(!files.length){toast('No quedaron archivos por subir.');return}
    }
    const porNombre={};hs.forEach(x=>{porNombre[x.file.name]=x.h});

    // 2. Subida
    for(let i=0;i<files.length;i++){
      const f=files[i];
      velo(true,`Subiendo ${i+1} de ${files.length}: ${f.name}`);
      const ruta=await subirDocumento('pendientes/'+tipo,f);
      DB[ARCH.pend].data.pendientes.push({id:'P-'+Date.now()+'-'+i,tipo,archivo:ruta,nombre:f.name,hash:porNombre[f.name],subido:hoyISO(),nota,...(fenv?{fecha_envio:fenv}:{})});
      reg.push({hash:porNombre[f.name],nombre:f.name,tipo,ruta,estado:'en_cola',fecha:hoyISO(),referencia:null});
    }
    await guardarArchivo(ARCH.pend,`${files.length} documento(s) en cola (${tipo})`);
    await guardarArchivo(ARCH.arch,`Registro de archivos: ${files.length} documento(s)`);
    toast(`${files.length} documento(s) en cola. El administrador los procesará y cargará los datos.`);render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

  const lineas=[];
  ocs.filter(o=>ocEstado(o)!=='despachada').forEach(o=>{const s=semaforo(o);
    o.items.forEach(i=>{
      const total=+i.cantidad||0;
      const pendiente=Math.max(total-(+i.cantidad_despachada||0),0);
      const porComprar=Math.max(total-(+i.cantidad_comprada||0),0);
      if(pendiente<=0&&porComprar<=0)return;
      lineas.push({origen:'oc',ref:i,oc:String(o.folio),cot:o.cotizacion_sap||'',producto:i.producto,
        codigo:codigoDeItem(i.producto,i.codigo),cantidad:total,pendiente,porComprar,
        bodega:normBodega(o.destino),precio:+i.precio_unitario||0,sem:s});
    });
  });
  const psap=((DB[ARCH.psap]&&DB[ARCH.psap].data.registros)||[]).filter(r=>!folios.has(String(r.doc_compras||'')));
  psap.forEach(r=>{
    const total=+r.cantidad||0;
    const pendiente=+r.por_entregar||0;
    const porComprar=Math.max(total-(+r.cantidad_comprada||0),0);
    if(pendiente<=0&&porComprar<=0)return;
    lineas.push({origen:'sap',ref:r,oc:String(r.doc_compras||''),cot:'',producto:r.producto,
      codigo:r.codigo||codigoDeItem(r.producto,null),cantidad:total,pendiente,porComprar,
      bodega:normBodega(r.bodega||bodegaDeCentro(r.centro)||''),precio:+r.precio_neto||0,sem:{c:'gris',txt:'SAP'}});
  });
  return lineas;
}
/* Las lineas siguen trayendo `sem` (urgencia) y `cot` (cotizacion) aunque el Panel ya no
   muestre esas columnas (orden de Jefe, 22-07-2026): quedan listas por si se reactivan.
   El semaforo de fechas se sigue viendo en la pestana Ordenes de compra. */
/* Consolidado por producto (un código NOV = una fila, stock GLOBAL) */
function consolidadoConfirmado(lineas){
  const map={};
  lineas.forEach(l=>{
    const k=l.codigo||('N:'+normProd(l.producto));
    const c=map[k]=map[k]||{k,codigo:l.codigo,producto:l.producto,cantidad:0,pendiente:0,porComprar:0,bodegas:new Set(),lineas:[]};
    if(l.codigo&&!c.codigo)c.codigo=l.codigo;
    c.cantidad+=l.cantidad;c.pendiente+=l.pendiente;c.porComprar+=l.porComprar;
    c.bodegas.add(l.bodega);c.lineas.push(l);
  });
  return Object.values(map)
    .map(c=>({...c,stock:stockDeCodigo(c.codigo,c.producto)}))
    .sort((a,b)=>a.producto.localeCompare(b.producto,'es'));
}
let panelSort={campo:'producto',dir:1};
function sortPanel(campo){if(panelSort.campo===campo)panelSort.dir*=-1;else panelSort={campo,dir:1};render()}

/* ===== Marcado de compras desde el Panel =====
   Al marcar: ingreso a inventario por el TOTAL pendiente de compra del producto
   (un código NOV, un stock global). Varias bodegas de destino → modal de reparto;
   una sola → asignación directa sin preguntar. */
function consPorClave(k){
  return consolidadoConfirmado(lineasConfirmadas()).find(c=>c.k===k);
}
async function marcarCompra(ke){
  const k=decodeURIComponent(ke);
  const c=consPorClave(k);
  if(!c||c.porComprar<=0){toast('No hay compra pendiente para este producto.');return}
  const porBod={};
  c.lineas.filter(l=>l.porComprar>0).forEach(l=>{porBod[l.bodega]=(porBod[l.bodega]||0)+l.porComprar});
  const reparto=await modalCompra(c,porBod);   // SIEMPRE pregunta la cantidad comprada
  if(!reparto)return;
  await aplicarCompra(c,reparto);
}
function modalCompra(c,porBod){
  return new Promise(res=>{
    const bods=Object.keys(porBod);
    const varias=bods.length>1;
    const ov=document.createElement('div');ov.className='modal-ov';
    ov.innerHTML=`<div class="modal">
      <b>¿Cuánto se compró?</b>
      <p class="small muted">${esc(c.producto)} · pendiente de compra: <b class="mono">${num(c.porComprar)}</b>.
      No hace falta comprar el total: lo que no ingreses queda pendiente y sigue apareciendo en el Panel.</p>
      ${varias
        ? `<p class="small muted">Este producto va a ${bods.length} bodegas. Indica cuánto compraste para cada una.</p>`+
          bods.map(b=>`<label>${esc(b)} <span class="muted" style="text-transform:none;font-weight:400">· pendiente ${num(porBod[b])}</span></label>
            <input type="number" class="cmp-inp" data-b="${esc(b)}" min="0" max="${porBod[b]}" step="any" value="${porBod[b]}">`).join('')
        : `<label>Cantidad comprada <span class="muted" style="text-transform:none;font-weight:400">· máximo ${num(c.porComprar)}</span></label>
           <input type="number" class="cmp-inp" data-b="${esc(bods[0]||'')}" min="0" max="${c.porComprar}" step="any" value="${c.porComprar}">`}
      <p class="small mono" id="cmp-res" style="margin-top:12px"></p>
      <div class="acciones"><button class="btn mini" id="cmp-ok">Registrar compra</button><button class="btn mini sec" id="cmp-cancel">Cancelar</button></div>
    </div>`;
    document.body.appendChild(ov);
    const inps=[...ov.querySelectorAll('.cmp-inp')];
    const suma=()=>inps.reduce((a,i)=>a+(+i.value||0),0);
    const refrescar=()=>{
      const s=suma(),queda=c.porComprar-s,el=ov.querySelector('#cmp-res');
      if(s<=0){el.textContent='Ingresa una cantidad mayor que cero.';el.style.color='var(--rojo)';return}
      if(s>c.porComprar){el.textContent=`Te pasaste: el pendiente es ${num(c.porComprar)}.`;el.style.color='var(--rojo)';return}
      el.textContent=queda>0?`Entran ${num(s)} al inventario · quedan ${num(queda)} pendientes de compra`
                            :`Entran ${num(s)} al inventario · queda todo comprado`;
      el.style.color=queda>0?'var(--ambar)':'var(--verde)';
    };
    inps.forEach(i=>{i.oninput=refrescar});refrescar();
    setTimeout(()=>{inps[0]&&inps[0].select()},50);
    ov.querySelector('#cmp-ok').onclick=()=>{
      const s=suma();
      if(s<=0){toast('Ingresa la cantidad comprada.');return}
      if(s>c.porComprar){toast(`No puedes registrar más de ${num(c.porComprar)}.`);return}
      const r={};inps.forEach(i=>{const q=+i.value||0;if(q>0)r[i.dataset.b]=q});
      ov.remove();res(r);};
    ov.querySelector('#cmp-cancel').onclick=()=>{ov.remove();res(null)};
  });
}
async function aplicarCompra(c,reparto){
  velo(true,'Marcando compra…');
  try{
    const fecha=hoyISO();
    let tocaOC=false,tocaPsap=false,total=0;
    // Lo comprado se imputa dentro de cada bodega, línea por línea, empezando por la OC más
    // antigua. Lo que no alcanza a cubrirse queda pendiente y vuelve a aparecer en el Panel.
    Object.entries(reparto).forEach(([bod,cant])=>{
      let queda=+cant||0;
      c.lineas.filter(l=>l.bodega===bod&&l.porComprar>0)
        .sort((a,b)=>String(a.oc).localeCompare(String(b.oc),'es',{numeric:true}))
        .forEach(l=>{
          if(queda<=0)return;
          const usa=Math.min(queda,l.porComprar);
          l.ref.cantidad_comprada=(+l.ref.cantidad_comprada||0)+usa;
          queda-=usa;total+=usa;
          if(l.origen==='oc')tocaOC=true;else tocaPsap=true;
        });
    });
    if(total<=0){velo(false);toast('No se registró ninguna cantidad.');return}
    // Ingreso al inventario por el TOTAL (un código, stock global)
    const inv=DB[ARCH.inv].data;
    let m=c.codigo?DB[ARCH.prod].data.productos.find(p=>p.codigo===c.codigo):prodMaestro(c.producto);
    if(!m)m=crearProdMaestro(c.producto,'UN');
    let p=inv.productos.find(x=>x.codigo===m.codigo);
    if(!p){p={codigo:m.codigo,nombre:m.nombre,cantidad:0,unidad:m.unidad};inv.productos.push(p)}
    p.cantidad+=total;
    const repTxt=Object.entries(reparto).map(([b,q])=>`${b} ${num(q)}`).join(', ');
    inv.movimientos.push({fecha,tipo:'ingreso',codigo:p.codigo,producto:p.nombre,cantidad:total,referencia:`Compra marcada (Panel)${repTxt?' · reparto: '+repTxt:''}`});
    await guardarMaestroSiNuevo();
    if(tocaOC)await guardarArchivo(ARCH.oc,`Compra marcada: ${m.nombre}`);
    if(tocaPsap)await guardarArchivo(ARCH.psap,`Compra marcada (Pendientes SAP): ${m.nombre}`);
    await guardarArchivo(ARCH.inv,`Inventario: ingreso por compra marcada (${m.nombre} +${total})`);
    const resta=c.porComprar-total;
    toast(`Compra registrada: ${m.nombre} +${num(total)} al inventario${resta>0?` · quedan ${num(resta)} pendientes`:''}`);
    render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

/* ================= Lectura automática de OC de SAP en PDF (etapa 1) =================
   pdf.js vive en lib/ dentro de este mismo repo. Se carga solo cuando se usa.
   NADA se guarda sin que Jefe lo confirme en pantalla. */
let ocLeida=null;
async function cargarPdfJs(){
  if(window._pdfjs)return window._pdfjs;
  const m=await import('./lib/pdf.min.mjs');
  m.GlobalWorkerOptions.workerSrc='./lib/pdf.worker.min.mjs';
  window._pdfjs=m;return m;
}
/* Reconstruye las líneas respetando las distancias horizontales: los PDF de SAP vienen
   en dos columnas y sin esto el texto legal se mezcla con los datos. */
function lineasDePdf(paginas){
  const items=[].concat(...paginas).filter(i=>i.str.trim());
  if(!items.length)return [];
  const anchos=items.filter(i=>i.str.length>1&&i.w>0).map(i=>i.w/i.str.length).sort((a,b)=>a-b);
  const u=anchos[Math.floor(anchos.length/2)]||5;
  const filas={};
  items.forEach(i=>{const y=Math.round(i.y/3);(filas[y]=filas[y]||[]).push(i)});
  const minX=Math.min(...items.map(i=>i.x));
  return Object.keys(filas).sort((a,b)=>b-a).map(y=>{
    let s='';
    filas[y].sort((a,b)=>a.x-b.x).forEach(i=>{
      const col=Math.round((i.x-minX)/u);
      if(col>s.length)s+=' '.repeat(col-s.length);
      s+=i.str;
    });
    return s.replace(/\s+$/,'');
  }).filter(l=>l.trim());
}
const nSap=s=>{const t=String(s).trim().replace(/\./g,'').replace(',','.');return Math.round(parseFloat(t)*100)/100};
const REGLAS_BODEGA=[[/SAN FRANCISCO|MOSTAZAL/,'San Francisco de Mostazal'],[/CENTRAL|RANCAGUA/,'Rancagua'],
                     [/PEUMO|CALERA/,'El Peumo'],[/LONGOVILO/,'Longovilo']];
function parseOC(lineas){
  const txt=lineas.join('\n');
  const g=(re,i=1)=>{const m=txt.match(re);return m?m[i].trim():null};
  const fe=txt.match(/Fecha\s*:\s*(\d{2})\.(\d{2})\.(\d{4})/);
  const items=[];
  lineas.forEach(l=>{
    const m=l.match(/^\s*(\d{2,3})\s+([\d.,]+)\s+([A-Z]{1,4})\s+Cod:\s*(\d{10})?\s*(.+?)\s{2,}([\d.,]+)\s+([\d.,]+)\s*$/);
    if(m)items.push({pos:+m[1],cantidad:nSap(m[2]),unidad:m[3],codigo_sap:m[4]||null,
                     producto:m[5].trim(),precio:nSap(m[6]),total:nSap(m[7])});
  });
  const mman=txt.match(/(?:ENTREGAR EN|DESPACHAR A)\s+([A-ZÁÉÍÓÚÑ ]{4,})/);
  const crudo=(mman?mman[1]:g(/Lugar de Entrega\s*:\s*(.+?)(?:Direcci|$)/m))||'';
  const bod=REGLAS_BODEGA.find(([re])=>re.test(crudo.toUpperCase()));
  const mt=txt.match(/TOTAL SIN IVA\s*:?\s*([\d.,]+)/);
  return {folio:g(/N[ºo°]\s*:\s*(45009\d{5})/),fecha_emision:fe?`${fe[3]}-${fe[2]}-${fe[1]}`:null,
          cotizacion_sap:g(/Cotización\s*:\s*(\d+)/),emisor:g(/Emisor O\/C\s*:\s*(.+)/),
          destino_texto:crudo.trim(),destino:bod?bod[1]:null,
          total_documento:mt?nSap(mt[1]):null,items};
}
function validarOC(oc){
  const e=[];
  if(!oc.folio)e.push('No se encontró el número de la orden de compra (formato 45009XXXXX).');
  if(!oc.fecha_emision)e.push('No se encontró la fecha de emisión.');
  if(!oc.destino)e.push(`No se reconoció la bodega de destino${oc.destino_texto?` (el documento dice "${oc.destino_texto}")`:''}.`);
  if(!oc.items.length)e.push('No se encontró ninguna línea de producto.');
  oc.items.forEach(i=>{if(Math.abs(i.cantidad*i.precio-i.total)>0.5)
    e.push(`Línea ${i.pos} (${i.producto}): ${num(i.cantidad)} × ${clp(i.precio)} no da ${clp(i.total)}.`)});
  const suma=oc.items.reduce((a,i)=>a+i.total,0);
  if(oc.total_documento!=null&&Math.abs(suma-oc.total_documento)>0.5)
    e.push(`La suma de las líneas (${clp(suma)}) no coincide con el total del documento (${clp(oc.total_documento)}).`);
  if(oc.folio&&DB[ARCH.oc].data.ordenes.some(o=>String(o.folio)===oc.folio))
    e.push(`La orden de compra ${oc.folio} ya está cargada en el sistema.`);
  return e;
}
function consolidarOC(items){
  const m=new Map();
  items.forEach(i=>{const k=(i.codigo_sap||i.producto)+'|'+i.precio;
    if(m.has(k)){const c=m.get(k);c.cantidad+=i.cantidad;c.total+=i.total;c.fusion++}
    else m.set(k,{...i,fusion:1})});
  return [...m.values()].sort((a,b)=>a.pos-b.pos);
}
/* Resolución contra el maestro: lo inequívoco se resuelve solo, lo dudoso queda para Jefe */
function resolverItems(items){
  const prods=DB[ARCH.prod].data.productos;
  const nrm=t=>String(t||'').toUpperCase().replace(/Ñ/g,'N').replace(/[^A-Z0-9]/g,'');
  return items.map(i=>{
    const porSap=i.codigo_sap?prods.filter(p=>(p.codigos_cliente||{}).agrosuper===i.codigo_sap):[];
    const porNom=prods.filter(p=>nrm(p.nombre)===nrm(i.producto));
    let estado='nuevo',codigo=null,opciones=[];
    if(porSap.length&&porNom.length&&porSap.some(p=>porNom.includes(p))){
      estado='existente';codigo=porSap.find(p=>porNom.includes(p)).codigo;
    }else if(porSap.length===1&&!porNom.length){estado='existente';codigo=porSap[0].codigo;
    }else if(porNom.length===1&&!porSap.length){estado='existente';codigo=porNom[0].codigo;
    }else if(porSap.length||porNom.length){
      estado='ambiguo';opciones=[...new Set([...porSap,...porNom])].map(p=>({codigo:p.codigo,nombre:p.nombre}));
      codigo='';
    }
    return {...i,estado,codigo,opciones};
  });
}
async function leerOCpdf(){
  const inp=document.getElementById('oc-pdf');
  const f=inp&&inp.files[0];
  if(!f){toast('Elige el PDF de la orden de compra.');return}
  velo(true,'Leyendo el PDF…');
  try{
    const h=await huella(f);
    const reg=(DB[ARCH.arch]&&DB[ARCH.arch].data.archivos)||[];
    const previo=reg.find(r=>r.hash===h);
    const pdfjs=await cargarPdfJs();
    const doc=await pdfjs.getDocument({data:new Uint8Array(await f.arrayBuffer())}).promise;
    const pags=[];
    for(let p=1;p<=doc.numPages;p++){
      const c=await (await doc.getPage(p)).getTextContent();
      pags.push(c.items.map(i=>({str:i.str,x:i.transform[4],y:i.transform[5],w:i.width})));
    }
    const lineas=lineasDePdf(pags);
    if(!lineas.length){velo(false);toast('El PDF no tiene texto legible: es una imagen escaneada. Súbelo a la cola para que lo procese el administrador.');return}
    const oc=parseOC(lineas);
    oc.items=consolidarOC(oc.items);
    ocLeida={...oc,archivo:f,hash:h,previo:previo||null,
             errores:validarOC(oc),resueltos:resolverItems(oc.items),
             fecha_entrega:oc.fecha_emision?new Date(Date.parse(oc.fecha_emision)+15*864e5).toISOString().slice(0,10):null};
    render();
    toast(ocLeida.errores.length?'Leído con observaciones: revísalas antes de guardar.':'PDF leído. Revisa y confirma.');
  }catch(e){toast('No se pudo leer el PDF: '+e.message)}
  velo(false);
}
function descartarOCLeida(){ocLeida=null;render();toast('Lectura descartada')}

async function guardarOCLeida(){
  const o=ocLeida;
  if(!o)return;
  if(o.errores.length){toast('Hay observaciones sin resolver: no se puede guardar.');return}
  const sinDefinir=o.resueltos.filter(r=>r.estado==='ambiguo'&&!r.codigo);
  if(sinDefinir.length){toast(`Falta decidir el producto de ${sinDefinir.length} línea(s).`);return}
  velo(true,'Guardando la orden de compra…');
  try{
    const d=DB[ARCH.prod].data;
    const items=o.resueltos.map(r=>{
      let cod=r.codigo;
      if(r.estado==='nuevo'||cod==='__nuevo__'){
        d.correlativo++;cod='NOV-'+String(d.correlativo).padStart(4,'0');
        d.productos.push({codigo:cod,nombre:r.producto,unidad:r.unidad||'UN',
                          codigos_cliente:r.codigo_sap?{agrosuper:r.codigo_sap}:{},alias:[]});
      }else if(r.codigo_sap){
        const p=d.productos.find(x=>x.codigo===cod);
        if(p){p.codigos_cliente=p.codigos_cliente||{};if(!p.codigos_cliente.agrosuper)p.codigos_cliente.agrosuper=r.codigo_sap}
      }
      return {producto:r.producto,codigo:cod,codigo_sap:r.codigo_sap,cantidad:r.cantidad,
              unidad:r.unidad,precio_unitario:r.precio,cantidad_comprada:0,cantidad_despachada:0};
    });
    const ruta=`documentos/ordenes_compra/OC_${o.folio}.pdf`;
    await subirDocumento('ordenes_compra',o.archivo,`OC_${o.folio}.pdf`);
    DB[ARCH.oc].data.ordenes.push({folio:o.folio,cotizacion_id:null,cotizacion_sap:o.cotizacion_sap,
      emisor:o.emisor,fecha_emision:o.fecha_emision,fecha_entrega:o.fecha_entrega,destino:o.destino,
      cliente:'Agricola Super Ltda',items,compras:[],guias:[],archivo:ruta,
      notas:'Leída automáticamente desde el PDF y confirmada en pantalla. Fecha de entrega = emisión + 15 días.'});
    (DB[ARCH.arch].data.archivos).push({hash:o.hash,nombre:o.archivo.name,tipo:'ordenes_compra',
      ruta,estado:'procesado',fecha:hoyISO(),referencia:'OC '+o.folio});
    await guardarArchivo(ARCH.prod,`Maestro: productos de la OC ${o.folio}`);
    await guardarArchivo(ARCH.oc,`OC ${o.folio} cargada desde el PDF`);
    await guardarArchivo(ARCH.arch,`Registro de archivos: OC ${o.folio}`);
    ocLeida=null;toast(`Orden de compra ${o.folio} cargada`);render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

async function crearOC(){
  const folio=v('o-folio').trim(),cotId=v('o-cot'),items=leerItems('o-items');
  if(!folio||!items.length||!v('o-fent')){toast('Faltan folio, ítems o fecha de entrega.');return}
  if(!cotId){toast('Selecciona la cotización de origen.');return}
  if(DB[ARCH.oc].data.ordenes.some(o=>o.folio===folio)){toast('Ya existe una OC con ese folio.');return}
  velo(true,'Guardando OC…');
  try{
    DB[ARCH.oc].data.ordenes.push({folio,cotizacion_id:cotId,fecha_emision:v('o-femi'),fecha_entrega:v('o-fent'),destino:v('o-dest').trim(),cliente:DB[ARCH.conf].data.cliente_principal,items:items.map(i=>({...i,cantidad_comprada:0,cantidad_despachada:0})),compras:[],guias:[],archivo:null,notas:''});
    const c=DB[ARCH.cot].data.cotizaciones.find(x=>x.id===cotId);
    if(c){c.estado='convertida';c.oc_asociada=folio}
    await guardarArchivo(ARCH.oc,`OC ${folio} registrada`);
    await guardarArchivo(ARCH.cot,`Cotización ${c?c.folio:''} convertida en OC ${folio}`);
    toast('OC guardada');render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function borrarOC(fe){
  const folio=decodeURIComponent(fe);
  const arr=DB[ARCH.oc].data.ordenes;const o=arr.find(x=>x.folio===folio);if(!o)return;
  if(o.guias?.length){toast(`La OC ${folio} tiene guías asociadas (${o.guias.join(', ')}). Elimina primero esas guías.`);return}
  const comprasBod=(o.compras||[]).filter(c=>c.ingreso_bodega);
  let msg=`¿Dar de baja la OC ${folio}?`;
  if(comprasBod.length)msg+=`\n\nSe revertirán del inventario los ingresos de sus ${comprasBod.length} compra(s) registrada(s).`;
  if(o.cotizacion_id)msg+=`\nSu cotización volverá al estado "enviada".`;
  if(!confirm(msg))return;
  velo(true,'Dando de baja…');
  try{
    const inv=DB[ARCH.inv].data;
    comprasBod.forEach(cp=>cp.items.forEach(it=>{
      const p=invProdDe(it.producto,null,false);
      if(p){p.cantidad-=it.cantidad;
        inv.movimientos.push({fecha:hoyISO(),tipo:'ajuste',codigo:p.codigo,producto:p.nombre,cantidad:-it.cantidad,referencia:`Reverso por baja de OC ${folio}`})}
    }));
    const c=DB[ARCH.cot].data.cotizaciones.find(x=>x.id===o.cotizacion_id);
    if(c){c.estado='enviada';c.oc_asociada=null}
    arr.splice(arr.indexOf(o),1);
    await guardarArchivo(ARCH.oc,`OC ${folio} dada de baja`);
    if(c)await guardarArchivo(ARCH.cot,`Cotización ${c.folio} liberada por baja de OC ${folio}`);
    if(comprasBod.length)await guardarArchivo(ARCH.inv,`Inventario: reverso por baja de OC ${folio}`);
    if(o.archivo)await borrarArchivoRepo(o.archivo,`Borrado documento de OC ${folio}`);
    toast(`OC ${folio} dada de baja`);render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function borrarGuia(numero){
  const arr=DB[ARCH.guias].data.guias;const g=arr.find(x=>x.numero===numero);if(!g)return;
  let msg=`¿Eliminar la guía N°${numero}?\n\nSe devolverán sus cantidades al inventario y al pendiente de la OC ${g.folio_oc}.`;
  if(g.hoja_ruta)msg+=`\n\nAtención: esta guía ya está incluida en la Hoja de Ruta N°${g.hoja_ruta}.`;
  if(!confirm(msg))return;
  velo(true,'Eliminando guía…');
  try{
    const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===g.folio_oc);
    if(o){
      g.items.forEach(it=>{
        const oi=o.items.find(x=>x.producto.trim().toLowerCase()===it.producto.trim().toLowerCase());
        if(oi)oi.cantidad_despachada=Math.max(0,(+oi.cantidad_despachada||0)-it.cantidad);
      });
      o.guias=(o.guias||[]).filter(n=>n!==numero);
    }
    const inv=DB[ARCH.inv].data;
    g.items.forEach(it=>{
      const p=invProdDe(it.producto);
      p.cantidad+=it.cantidad;
      inv.movimientos.push({fecha:hoyISO(),tipo:'ingreso',codigo:p.codigo,producto:p.nombre,cantidad:it.cantidad,referencia:`Reverso por eliminación de guía N°${numero}`});
    });
    arr.splice(arr.indexOf(g),1);
    await guardarArchivo(ARCH.guias,`Guía N°${numero} eliminada`);
    if(o)await guardarArchivo(ARCH.oc,`OC ${g.folio_oc}: reverso de guía N°${numero}`);
    await guardarArchivo(ARCH.inv,`Inventario: reverso de guía N°${numero}`);
    toast(`Guía N°${numero} eliminada y cantidades devueltas`);render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

async function guardarCompra(fe){
  const folio=decodeURIComponent(fe);
  const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===folio);if(!o)return;
  const box=document.getElementById('fc-'+fe);
  const prov=document.getElementById('pc-prov-'+fe).value.trim();
  const fecha=document.getElementById('pc-fecha-'+fe).value||hoyISO();
  const aBodega=document.getElementById('pc-bod-'+fe).checked;
  const filas=[...box.querySelectorAll('input[type=number]')].map(inp=>({ix:+inp.dataset.ix,cant:+inp.value||0})).filter(f=>f.cant>0);
  if(!filas.length){toast('Indica al menos una cantidad comprada.');return}
  for(const f of filas){const it=o.items[f.ix];const pc=(+it.cantidad||0)-(+it.cantidad_comprada||0);
    if(f.cant>pc){toast(`"${it.producto}": lo pendiente de compra es ${num(pc)}.`);return}}
  velo(true,'Registrando compra…');
  try{
    const itemsC=filas.map(f=>({producto:o.items[f.ix].producto,cantidad:f.cant}));
    filas.forEach(f=>{o.items[f.ix].cantidad_comprada=(+o.items[f.ix].cantidad_comprada||0)+f.cant});
    o.compras=o.compras||[];o.compras.push({fecha,proveedor:prov,ingreso_bodega:aBodega,items:itemsC});
    if(aBodega){
      const inv=DB[ARCH.inv].data;
      itemsC.forEach(it=>{
        const p=invProdDe(it.producto);
        p.cantidad+=it.cantidad;
        inv.movimientos.push({fecha,tipo:'ingreso',codigo:p.codigo,producto:p.nombre,cantidad:it.cantidad,referencia:`Compra OC ${folio}${prov?' · '+prov:''}`});
      });
      await guardarMaestroSiNuevo();
    }
    await guardarArchivo(ARCH.oc,`OC ${folio}: compra registrada${prov?' ('+prov+')':''}`);
    if(aBodega)await guardarArchivo(ARCH.inv,`Inventario: ingreso por compra OC ${folio}`);
    toast('Compra registrada');render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

      <div><label>Fecha</label><input id="g-fecha" type="date" value="${hoyISO()}"></div>
      <div><label>OC asociada</label><select id="g-oc"><option value="">— seleccionar —</option>${ocsAct.map(o=>`<option value="${esc(o.folio)}">OC ${esc(o.folio)} · entrega ${fFecha(o.fecha_entrega)}</option>`).join('')}</select></div>
    </div>

  </div></details>
  <h2>Guías registradas</h2>
  ${(()=>{
    const gs=DB[ARCH.guias].data.guias;
    if(!gs.length)return '<div class="card vacio">Aún no hay guías registradas.</div>';
    /* La fecha que agrupa es la FECHA DE ENVÍO de la hoja de ruta (el día que salió el camión),
       no la fecha propia de la guía: dos guías con fechas distintas pueden haber viajado juntas.

    const hojas=DB[ARCH.hr].data.hojas;

/* Tarjeta de una guía. Las diferencias de NOMBRE ya se ven en la tabla (columna en ámbar).
   Las diferencias de COMPRA (se despachó más de lo comprado) se muestran como icono rojo
   junto a la cantidad; al pasar el mouse explica el problema y ofrece ingresar la compra. */
function tarjetaGuia(g){
  const oc=DB[ARCH.oc].data.ordenes.find(o=>String(o.folio)===String(g.oc||g.folio_oc));
  const nomOC=cod=>{const i=oc&&oc.items.find(x=>x.codigo===cod);return i?i.producto:null};
  const faltaCompra=it=>{ // devuelve cuánto falta comprar para cubrir lo despachado
    if(!oc)return 0;
    const i=oc.items.find(x=>x.codigo===it.codigo)||oc.items.find(x=>x.producto.trim().toUpperCase()===it.producto.trim().toUpperCase());
    if(!i)return 0;
    return Math.max((+i.cantidad_despachada||0)-(+i.cantidad_comprada||0),0);
  };
  const hayFalta=g.items.some(i=>faltaCompra(i)>0);
  return `<div class="card">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span class="mono" style="font-weight:700;font-size:var(--fs-lg)">Guía N° ${esc(g.numero)}</span>
      <span class="chip" title="Fecha de la guía">${fFecha(g.fecha)}</span>
      <span class="chip ink">OC ${esc(g.oc||g.folio_oc)}</span>
      ${g.hoja_ruta?'':'<span class="chip ambar">Sin hoja de ruta</span>'}
      <button class="btn mini peligro" style="margin-left:auto" onclick="borrarGuia('${esc(g.numero)}')">Eliminar</button>
    </div>
    <table class="tprod" style="margin-top:12px;min-width:520px"><colgroup><col><col><col style="width:11ch"></colgroup>
      <tr><th>Producto según la OC</th><th>Nombre en la guía</th><th class="num">Cantidad</th></tr>
    ${g.items.map(i=>{const no=nomOC(i.codigo);const dif=no&&no.trim().toUpperCase()!==i.producto.trim().toUpperCase();
      const falta=faltaCompra(i);
      return `<tr>
        <td class="trunc" title="${esc(no||i.producto)}">${esc(no||i.producto)}</td>
        <td class="trunc" title="${esc(i.producto)}" style="${dif?'color:var(--ambar)':'color:var(--muted)'}">${dif?esc(i.producto):'igual'}</td>
        <td class="num">${num(i.cantidad)} ${esc(i.unidad||'')}${falta>0?` <i class="fa-solid fa-circle-exclamation alerta-cifra" title="Se despacharon ${num(i.cantidad)} pero faltan ${num(falta)} por registrar como comprados. Ingresa la compra para cuadrar el inventario."></i>`:''}</td></tr>`}).join('')}</table>
    ${hayFalta?`<div style="margin-top:10px"><button class="btn mini" style="background:none;border:1.5px solid var(--rojo);color:var(--rojo)" onclick="compraFaltante('${esc(g.numero)}',this)"><i class="fa-solid fa-cart-plus"></i> Ingresar compra faltante</button>
      <div id="cf-${esc(g.numero)}"></div></div>`:''}
  </div>`;
}
/* Ingreso de compra DESPUÉS de la guía (via de excepción, no el flujo normal).
   Registra la compra en la OC y, si se marca, ingresa al inventario. */
function compraFaltante(numero,btn){
  const g=DB[ARCH.guias].data.guias.find(x=>String(x.numero)===String(numero));
  const oc=g&&DB[ARCH.oc].data.ordenes.find(o=>String(o.folio)===String(g.oc||g.folio_oc));
  const box=document.getElementById('cf-'+numero);
  if(box.innerHTML){box.innerHTML='';return}
  const faltas=g.items.map(it=>{
    const i=oc&&(oc.items.find(x=>x.codigo===it.codigo)||oc.items.find(x=>x.producto.trim().toUpperCase()===it.producto.trim().toUpperCase()));
    if(!i)return null;
    const falta=Math.max((+i.cantidad_despachada||0)-(+i.cantidad_comprada||0),0);
    return falta>0?{ix:oc.items.indexOf(i),producto:i.producto,falta}:null;
  }).filter(Boolean);
  box.innerHTML=`<div style="border-top:1.5px dashed var(--line);margin-top:12px;padding-top:8px">
    <p class="small muted">Vía de excepción: normalmente la compra se ingresa antes de la guía. Registra aquí lo comprado para cuadrar la OC y el inventario.</p>
    <div class="grid2">
      <div><label>Proveedor</label><input id="cf-prov-${numero}" placeholder="ej: Ferretería El Volcán"></div>
      <div><label>Fecha de compra</label><input id="cf-fecha-${numero}" type="date" value="${hoyISO()}"></div>
    </div>
    <label style="text-transform:none;font-weight:400;letter-spacing:0;display:flex;gap:8px;align-items:center;margin-top:10px;color:var(--texto)"><input type="checkbox" id="cf-bod-${numero}" checked style="width:auto"> Ingresar al inventario</label>
    <table class="tprod" style="margin-top:10px;min-width:440px"><colgroup><col><col style="width:10ch"><col style="width:16ch"></colgroup><tr><th>Producto</th><th class="num">Falta comprar</th><th>Comprado ahora</th></tr>
    ${faltas.map(f=>`<tr><td class="trunc" title="${esc(f.producto)}">${esc(f.producto)}</td><td class="num" style="color:var(--rojo);font-weight:600">${num(f.falta)}</td><td><input type="number" data-ix="${f.ix}" min="0" max="${f.falta}" step="any" value="${f.falta}"></td></tr>`).join('')}</table>
    <div class="acciones"><button class="btn mini" onclick="guardarCompraFaltante('${numero}')">Guardar compra</button><button class="btn mini sec" onclick="compraFaltante('${numero}',this)">Cancelar</button></div>
  </div>`;
}
async function guardarCompraFaltante(numero){
  const g=DB[ARCH.guias].data.guias.find(x=>String(x.numero)===String(numero));
  const folio=g.oc||g.folio_oc;
  const oc=DB[ARCH.oc].data.ordenes.find(o=>String(o.folio)===String(folio));if(!oc)return;
  const box=document.getElementById('cf-'+numero);
  const prov=document.getElementById('cf-prov-'+numero).value.trim();
  const fecha=document.getElementById('cf-fecha-'+numero).value||hoyISO();
  const aBodega=document.getElementById('cf-bod-'+numero).checked;
  const filas=[...box.querySelectorAll('input[type=number]')].map(inp=>({ix:+inp.dataset.ix,cant:+inp.value||0})).filter(f=>f.cant>0);
  if(!filas.length){toast('Indica al menos una cantidad comprada.');return}
  velo(true,'Registrando compra…');
  try{
    const itemsC=filas.map(f=>({producto:oc.items[f.ix].producto,cantidad:f.cant}));
    filas.forEach(f=>{oc.items[f.ix].cantidad_comprada=(+oc.items[f.ix].cantidad_comprada||0)+f.cant});
    oc.compras=oc.compras||[];oc.compras.push({fecha,proveedor:prov,ingreso_bodega:aBodega,items:itemsC,posterior_guia:numero});
    if(aBodega){
      const inv=DB[ARCH.inv].data;
      itemsC.forEach(it=>{const p=invProdDe(it.producto);p.cantidad+=it.cantidad;
        inv.movimientos.push({fecha,tipo:'ingreso',codigo:p.codigo,producto:p.nombre,cantidad:it.cantidad,referencia:`Compra OC ${folio} (posterior a guía N°${numero})${prov?' · '+prov:''}`})});
      await guardarMaestroSiNuevo();
    }
    await guardarArchivo(ARCH.oc,`OC ${folio}: compra posterior a guía N°${numero}`);
    if(aBodega)await guardarArchivo(ARCH.inv,`Inventario: ingreso por compra posterior a guía N°${numero}`);
    toast('Compra registrada');render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
function prepFormGuia(){
  const sel=document.getElementById('g-oc');
  sel.addEventListener('change',()=>{
    const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===sel.value);
    const box=document.getElementById('g-items-box');
    if(!o){box.innerHTML='';return}
    document.getElementById('g-dest').value=o.destino||'';
    const pend=o.items.map((i,ix)=>({...i,ix,pendiente:(+i.cantidad||0)-(+i.cantidad_despachada||0)})).filter(i=>i.pendiente>0);
    box.innerHTML=`<label>Cantidades a despachar</label>
      <table class="tprod" style="min-width:440px"><colgroup><col><col style="width:9ch"><col style="width:15ch"></colgroup><tr><th>Producto</th><th class="num">Pendiente</th><th>Despachar</th></tr>
      ${pend.map(i=>`<tr><td class="trunc" title="${esc(i.producto)}">${esc(i.producto)}</td><td class="num">${num(i.pendiente)}</td>
        <td><input type="number" class="g-cant" data-ix="${i.ix}" min="0" max="${i.pendiente}" step="any" value="${i.pendiente}"></td></tr>`).join('')}</table>`;
  });
}
async function crearGuia(){
  const numero=v('g-num').trim(),folioOC=v('g-oc'),fecha=v('g-fecha'),destino=v('g-dest').trim();
  if(!numero||!folioOC){toast('Falta el N° de guía o la OC.');return}
  if(DB[ARCH.guias].data.guias.some(g=>g.numero===numero)){toast('Ya existe una guía con ese número.');return}
  const o=DB[ARCH.oc].data.ordenes.find(x=>x.folio===folioOC);
  const filas=[...document.querySelectorAll('.g-cant')].map(inp=>({ix:+inp.dataset.ix,cant:+inp.value||0})).filter(f=>f.cant>0);
  if(!filas.length){toast('Indica al menos una cantidad a despachar.');return}
  for(const f of filas){const it=o.items[f.ix];const pend=(+it.cantidad||0)-(+it.cantidad_despachada||0);
    if(f.cant>pend){toast(`"${it.producto}": no puedes despachar más de ${num(pend)}.`);return}}
  velo(true,'Registrando despacho…');
  try{
    const itemsGuia=filas.map(f=>({producto:o.items[f.ix].producto,codigo:o.items[f.ix].codigo||null,cantidad:f.cant}));
    // 1. Guía
    DB[ARCH.guias].data.guias.push({numero,fecha,destino,folio_oc:folioOC,items:itemsGuia,hoja_ruta:null});
    // 2. Avance OC
    filas.forEach(f=>{o.items[f.ix].cantidad_despachada=(+o.items[f.ix].cantidad_despachada||0)+f.cant});
    o.guias=o.guias||[];o.guias.push(numero);
    // 3. Inventario
    const inv=DB[ARCH.inv].data;let negativos=[];
    itemsGuia.forEach(it=>{
      // Candado: si el ítem trae código NOV (heredado de la OC), descontar SIEMPRE por código
      let p;
      if(it.codigo){
        p=inv.productos.find(x=>x.codigo===it.codigo);
        if(!p){const m=DB[ARCH.prod].data.productos.find(x=>x.codigo===it.codigo);
          p={codigo:it.codigo,nombre:m?m.nombre:it.producto,cantidad:0,unidad:m?m.unidad:'UN'};inv.productos.push(p)}
      } else {
        p=invProdDe(it.producto);
      }
      p.cantidad-=it.cantidad;if(p.cantidad<0)negativos.push(p.nombre);
      inv.movimientos.push({fecha,tipo:'salida',codigo:p.codigo,producto:p.nombre,cantidad:it.cantidad,referencia:`Guía N°${numero} · OC ${folioOC}`});
    });
    await guardarMaestroSiNuevo();
    await guardarArchivo(ARCH.guias,`Guía N°${numero} registrada (OC ${folioOC})`);
    await guardarArchivo(ARCH.oc,`OC ${folioOC}: despacho guía N°${numero}`);
    await guardarArchivo(ARCH.inv,`Inventario: salida por guía N°${numero}`);
    toast('Despacho registrado'+(negativos.length?` · Atención, stock negativo: ${negativos.join(', ')}`:''));
    render();
  }catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

/* ================= Inventario ================= */
function rInv(){
  const inv=DB[ARCH.inv].data;
  const prods=[...inv.productos].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const movs=[...inv.movimientos].reverse().slice(0,40);
  return `${dlProd()}
  <details class="form"><summary>Registrar ingreso a bodega</summary><div class="inner">
    <div class="grid3">
      <div><label>Producto</label><input id="i-prod" list="dl-prod"></div>
      <div><label>Cantidad</label><input id="i-cant" type="number" min="0" step="any"></div>
      <div><label>Referencia</label><input id="i-ref" placeholder="ej: Factura proveedor 1234"></div>
    </div>
    <div class="acciones"><button class="btn" onclick="ingresoInv()">Registrar ingreso</button></div>
  </div></details>
  <h2>Stock actual (${prods.length} productos)</h2>
  <div class="card">${prods.length?`<table class="tprod" style="min-width:460px"><colgroup><col style="width:11ch"><col><col style="width:9ch"><col style="width:10ch"></colgroup><tr><th>Código</th><th>Producto</th><th class="num">Cantidad</th><th class="num">Ajustar</th></tr>
    ${prods.map(p=>`<tr><td class="mono small">${esc(p.codigo||'—')}</td><td class="trunc" title="${esc(p.nombre)}">${esc(p.nombre)}</td><td class="num" style="font-weight:600;${p.cantidad<0?'color:var(--rojo)':''}">${num(p.cantidad)}</td>
    <td class="num"><button class="btn mini sec" onclick="ajusteInv('${esc(p.nombre).replace(/'/g,"\\'")}')"><i class="fa-solid fa-pen"></i></button> <button class="btn mini peligro" onclick="borrarProd('${esc(p.nombre).replace(/'/g,"\\'")}')"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('')}</table>`
    :'<div class="vacio">Bodega sin productos registrados. Usa "Registrar ingreso" para la carga inicial.</div>'}</div>
  <h2>Últimos movimientos</h2>
  <div class="card">${movs.length?`<table class="tprod" style="min-width:720px"><colgroup><col style="width:11ch"><col style="width:11ch"><col style="width:9ch"><col><col style="width:8ch"><col style="width:20ch"></colgroup><tr><th>Fecha</th><th>Código</th><th>Tipo</th><th>Producto</th><th class="num">Cant.</th><th>Referencia</th></tr>
    ${movs.map(m=>`<tr><td class="mono small">${fFecha(m.fecha)}</td><td class="mono small">${esc(m.codigo||'—')}</td><td><span class="chip ${m.tipo==='salida'?'rojo':m.tipo==='ingreso'?'verde':''}">${m.tipo}</span></td><td class="trunc" title="${esc(m.producto)}">${esc(m.producto)}</td><td class="num">${num(m.cantidad)}</td><td class="trunc small muted" title="${esc(m.referencia||'')}">${esc(m.referencia||'')}</td></tr>`).join('')}</table>`
    :'<div class="vacio">Sin movimientos aún.</div>'}</div>`;
}
async function ingresoInv(){
  const nombre=v('i-prod').trim(),cant=+v('i-cant');
  if(!nombre||!(cant>0)){toast('Falta producto o cantidad.');return}
  const inv=DB[ARCH.inv].data;
  const elegido=await resolverProducto(nombre);
  let m;
  if(elegido.crear){m=crearProdMaestro(elegido.crear,'UN')}else{m=elegido}
  let p=inv.productos.find(x=>x.codigo===m.codigo);
  if(!p){p={codigo:m.codigo,nombre:m.nombre,cantidad:0,unidad:m.unidad};inv.productos.push(p)}
  p.cantidad+=cant;
  inv.movimientos.push({fecha:hoyISO(),tipo:'ingreso',codigo:p.codigo,producto:p.nombre,cantidad:cant,referencia:v('i-ref').trim()});
  await guardarMaestroSiNuevo();
  velo(true);
  try{await guardarArchivo(ARCH.inv,`Inventario: ingreso ${nombre} (+${cant})`);toast('Ingreso registrado');render()}
  catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function borrarProd(nombre){
  const inv=DB[ARCH.inv].data;
  const p=inv.productos.find(x=>x.nombre===nombre);if(!p)return;
  let msg=`¿Eliminar el producto "${nombre}" del inventario?`;
  if(p.cantidad!==0)msg+=`\n\nAtención: tiene stock ${num(p.cantidad)} y se descartará ese saldo.`;
  if(!confirm(msg))return;
  inv.productos.splice(inv.productos.indexOf(p),1);
  inv.movimientos.push({fecha:hoyISO(),tipo:'ajuste',producto:nombre,cantidad:-p.cantidad,referencia:'Producto eliminado del inventario'});
  velo(true,'Eliminando…');
  try{await guardarArchivo(ARCH.inv,`Inventario: producto "${nombre}" eliminado`);toast('Producto eliminado');render()}
  catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}
async function ajusteInv(nombre){
  const inv=DB[ARCH.inv].data;
  const p=inv.productos.find(x=>x.nombre===nombre);if(!p)return;
  const nv=prompt(`Nueva cantidad para "${nombre}" (actual: ${p.cantidad}):`,p.cantidad);
  if(nv===null||nv==='')return;
  const dif=+nv-p.cantidad;p.cantidad=+nv;
  inv.movimientos.push({fecha:hoyISO(),tipo:'ajuste',producto:nombre,cantidad:dif,referencia:'Ajuste manual'});
  velo(true);
  try{await guardarArchivo(ARCH.inv,`Inventario: ajuste ${nombre} a ${nv}`);toast('Ajuste guardado');render()}
  catch(e){if(e.message!=='conflicto')toast('Error: '+e.message)}
  velo(false);
}

/* ================= Arranque ================= */
async function iniciar(){
  // Splash de identidad: mínimo 1.5s y fade out
  const sp=document.getElementById('splash');
  sp.style.display='flex';
  const splashListo=new Promise(r=>setTimeout(r,1500));
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hoy-lbl').textContent=new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
  try{await cargarTodo();render()}
  catch(e){toast('Error al cargar datos: '+e.message)}
  await splashListo;
  sp.classList.add('out');
  setTimeout(()=>sp.style.display='none',700);
}
(function(){
  const saved=localStorage.getItem(LSKEY);
  if(saved){cfg=JSON.parse(saved);iniciar()}
  else document.getElementById('setup').style.display='block';
})();
</script>
